<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Ranking - Exam Factory</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
text-align:center;
padding:20px;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
max-width:500px;
margin:auto;
}
.rank{
background:#1e293b;
margin:10px;
padding:10px;
border-radius:10px;
text-align:left;
}
</style>
</head>

<body>

<div class="card">
<h1>🏆 Live Ranking</h1>
<div id="list">Loading...</div>
</div>

<script>

// local leaderboard (demo live system)
let data = JSON.parse(localStorage.getItem("leaderboard")) || [];

if(data.length === 0){
data = [
{name:"You", score:localStorage.getItem("score") || 0}
];
}

data.sort((a,b)=>b.score-a.score);

let list = document.getElementById("list");
list.innerHTML="";

data.forEach((s,i)=>{
let div = document.createElement("div");
div.className="rank";
div.innerHTML = (i+1)+". "+s.name+" - "+s.score+"/50";
list.appendChild(div);
});

</script>

</body>
</html>
