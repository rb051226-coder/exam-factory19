<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Class 11 English (100 Qs)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 800px; margin: auto; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 24px; font-weight: 700; color: #fb7185; text-align: center; margin-bottom: 20px; }
        .q-box { font-size: 19px; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-left: 5px solid #38bdf8; border-radius: 8px; }
        .opt-btn { background: #1e293b; padding: 15px; margin-bottom: 10px; width: 100%; border-radius: 8px; border: 1px solid #334155; color: white; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .opt-btn:hover { background: #334155; border-color: #38bdf8; }
        .finish-btn { background: #ef4444; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .result-item { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #f87171; }
        .correct { color: #4ade80; font-weight: bold; }
        .wrong { color: #f87171; font-weight: bold; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">EXAM FACTORY ➔ Class 11 English</div>
    
    <div id="quiz-screen" class="screen active">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold; color:#38bdf8;">
            <span id="q-count">Question: 1 / 100</span>
            <span id="timer">Time: 120:00</span>
        </div>
        <div id="q-text" class="q-box">Loading...</div>
        <div id="opt-container">
            <button class="opt-btn" onclick="handleAnswer(0)"></button>
            <button class="opt-btn" onclick="handleAnswer(1)"></button>
            <button class="opt-btn" onclick="handleAnswer(2)"></button>
            <button class="opt-btn" onclick="handleAnswer(3)"></button>
        </div>
        <button class="finish-btn" onclick="endQuiz()">Finish Test</button>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="text-align:center; margin-bottom:20px; color:#4ade80;">Result Analysis</h2>
        <div id="score-summary" style="text-align:center; font-size: 24px; margin-bottom: 20px;"></div>
        <div id="review-list"></div>
        <div style="text-align:center; margin-top:30px;"><a href="#" onclick="location.reload()" style="color:#38bdf8; text-decoration:none; font-weight:bold;">◀ Restart Test</a></div>
    </div>
</div>

<script>

        { q: "11. Who was Tutankhamun?", options: ["A) An Egyptian King", "B) A scientist", "C) A Roman Emperor", "D) A poet"], correct: 0 },
        { q: "12. In which year was Tut’s tomb discovered?", options: ["A) 1922", "B) 1925", "C) 1930", "D) 1910"], correct: 0 },
        { q: "13. Who discovered the tomb?", options: ["A) Howard Carter", "B) Zahi Hawass", "C) Lord Carnarvon", "D) None"], correct: 0 },
        { q: "14. How old was Tut when he died?", options: ["A) A teenager", "B) A child", "C) An old man", "D) 30"], correct: 0 },
        { q: "15. What was Tut’s mummy buried with?", options: ["A) Gold, amulets", "B) Food only", "C) Weapons", "D) Nothing"], correct: 0 },
        { q: "16. Who wrote 'The Ailing Planet'?", options: ["A) Nani Palkhivala", "B) Vikram Seth", "C) A.R. Williams", "D) None"], correct: 0 },
        { q: "17. What movement is described?", options: ["A) Green Movement", "B) Red Movement", "C) Labour Movement", "D) None"], correct: 0 },
        { q: "18. Who is the world’s most dangerous animal?", options: ["A) Lion", "B) Human being", "C) Shark", "D) Tiger"], correct: 1 },
        { q: "19. When was the concept of sustainable development popularized?", options: ["A) 1987", "B) 1990", "C) 1980", "D) 2000"], correct: 0 },
        { q: "20. What is a key focus of the chapter?", options: ["A) Resources are finite", "B) We have unlimited energy", "C) Overpopulation is good", "D) Nature is evil"], correct: 0 },
        { q: "21. Who wrote 'The Browning Version'?", options: ["A) Terence Rattigan", "B) Shakespeare", "C) T.S. Eliot", "D) None"], correct: 0 },
        { q: "22. Who is Taplow?", options: ["A) A student", "B) A teacher", "C) A principal", "D) A clerk"], correct: 0 },
        { q: "23. Who is Mr. Crocker-Harris?", options: ["A) A strict teacher", "B) A friendly teacher", "C) A student", "D) A parent"], correct: 0 },

        { q: "40. In 'The Laburnum Top', the bird is?", options: ["A) Silent", "B) Sleek and alert", "C) Large", "D) Injured"], correct: 1 },

        { q: "43. 'The Address' is about?", options: ["A) War loss", "B) A treasure hunt", "C) A love story", "D) Mystery"], correct: 0 },
        { q: "44. 'Ranga's Marriage' is set in?", options: ["A) Hosahalli", "B) Mysore", "C) Bangalore", "D) Chennai"], correct: 0 },
        { q: "45. Who was Albert Einstein’s teacher at school?", options: ["A) Mr. Braun", "B) Mr. Koch", "C) Yuri", "D) None"], correct: 0 },

        { q: "47. Who is Mrs. Pearson’s neighbor?", options: ["A) Mrs. Fitzgerald", "B) Mrs. Hill", "C) Mrs. Smith", "D) None"], correct: 0 },
        { q: "48. What did Mrs. Fitzgerald suggest?", options: ["A) Changing personality", "B) Fighting", "C) Moving out", "D) Working"], correct: 0 },
        { q: "49. In 'The Address', who owned the items?", options: ["A) Mrs. S", "B) Mrs. Dorling", "C) The narrator", "D) None"], correct: 1 },
        { q: "50. Ranga studied in?", options: ["A) Bangalore", "B) London", "C) Paris", "D) Delhi"], correct: 0 },
        { q: "51. Who is the poet of 'A Photograph'?", options: ["A) Shirley Toulson", "B) Ted Hughes", "C) Walt Whitman", "D) None"], correct: 0 },
        { q: "52. What does 'transient' mean in 'A Photograph'?", options: ["A) Permanent", "B) Temporary", "C) Long", "D) Stable"], correct: 1 },
        { q: "53. What did the grandmother do in her village?", options: ["A) Prayed", "B) Fed dogs", "C) Ran a school", "D) None"], correct: 1 },
        { q: "54. What kind of person was Khushwant Singh's grandfather?", options: ["A) A turban wearer", "B) A clean shaven man", "C) A young man", "D) A farmer"], correct: 0 },
        { q: "55. How many days did the storm last in 'We're Not Afraid to Die'?", options: ["A) 2 days", "B) Multiple days", "C) 1 day", "D) 1 week"], correct: 1 },
        { q: "56. Who is the captain of the Wavewalker?", options: ["A) Narrator", "B) Larry", "C) Herb", "D) Jonathan"], correct: 0 },
        { q: "57. What did the narrator want to be when he grew up?", options: ["A) Sailor", "B) Captain", "C) Explorer", "D) Teacher"], correct: 0 },
        { q: "58. What was Tut's body wrapped in?", options: ["A) Gold", "B) Linen", "C) Plastic", "D) Silk"], correct: 1 },
        { q: "59. Which department is Ailing Planet related to?", options: ["A) Environment", "B) History", "C) Science", "D) Art"], correct: 0 },
        { q: "60. What is the 'zoo' in Lusaka?", options: ["A) A cage with a mirror", "B) Real animals", "C) A forest", "D) A bird sanctuary"], correct: 0 },
        { q: "61. Taplow is a ______ boy.", options: ["A) Young", "B) Old", "C) Middle-aged", "D) Child"], correct: 0 },
        { q: "62. Why did Taplow want to be a scientist?", options: ["A) Interest in science", "B) Force", "C) To earn money", "D) None"], correct: 0 },
        { q: "63. The Silk Road is a historical route for?", options: ["A) Silk trade", "B) Gold trade", "C) Salt trade", "D) Food trade"], correct: 0 },
        { q: "64. What was the weather condition in Darchen?", options: ["A) Harsh/Windy", "B) Sunny", "C) Rainy", "D) Moderate"], correct: 0 },
        { q: "65. Who is the poet of 'Childhood'?", options: ["A) Markus Natten", "B) Ted Hughes", "C) Walt Whitman", "D) None"], correct: 0 },
        { q: "66. At what age did the poet feel he lost his childhood?", options: ["A) 11", "B) 12", "C) 13", "D) 10"], correct: 0 },
        { q: "67. Who wrote 'Father to Son'?", options: ["A) Elizabeth Jennings", "B) Ted Hughes", "C) Markus Natten", "D) None"], correct: 0 },
        { q: "68. Does the father understand his son?", options: ["A) Yes", "B) No", "C) Partially", "D) Maybe"], correct: 1 },
        { q: "69. In 'Summer of the Beautiful White Horse', what tribe were they from?", options: ["A) Garoghlanian", "B) Armenian", "C) American", "D) None"], correct: 0 },
        { q: "70. What did the boys love most?", options: ["A) Horses", "B) Riding", "C) Money", "D) Food"], correct: 0 },
        { q: "71. Who was the narrator's mother in 'The Address'?", options: ["A) Mrs. S", "B) Mrs. Dorling", "C) Mrs. X", "D) None"], correct: 0 },
        { q: "72. Why did the narrator go to the address?", options: ["A) To reclaim belongings", "B) To visit", "C) To steal", "D) To kill"], correct: 0 },
        { q: "73. Who was the narrator in 'Ranga's Marriage'?", options: ["A) Shyama", "B) Ranga", "C) Ratna", "D) Village Head"], correct: 0 },
        { q: "74. What is the name of the girl Ranga married?", options: ["A) Ratna", "B) Sita", "C) Geeta", "D) Radha"], correct: 0 },
        { q: "75. What did Einstein say to his history teacher?", options: ["A) Facts don't matter", "B) I hate history", "C) I'm leaving", "D) None"], correct: 0 },
        { q: "76. Why did Einstein want to leave school?", options: ["A) Dull curriculum", "B) Punishment", "C) Distance", "D) Money"], correct: 0 },
        { q: "77. In 'Mother's Day', what did Mrs. Pearson change?", options: ["A) Her attitude", "B) House", "C) Job", "D) Family"], correct: 0 },
        { q: "78. What was Mrs. Pearson's name?", options: ["A) Annie", "B) Doris", "C) Cyril", "D) None"], correct: 0 },
        { q: "79. The poem 'The Voice of the Rain' uses?", options: ["A) Free verse", "B) Sonnet", "C) Ballad", "D) Epic"], correct: 0 },
        { q: "80. What does the rain do to the earth?", options: ["A) Washes it", "B) Destroys it", "C) Ignored it", "D) None"], correct: 0 },
        { q: "81. Who was the main character in 'The Portrait of a Lady'?", options: ["A) Grandmother", "B) Narrator", "C) Grandfather", "D) None"], correct: 0 },
        { q: "82. In 'The Ailing Planet', what is the biggest enemy?", options: ["A) Overpopulation", "B) Climate change", "C) Plastic", "D) None"], correct: 0 },
        { q: "83. What is the tone of 'The Browning Version'?", options: ["A) Humorous/Satirical", "B) Serious", "C) Sad", "D) Romantic"], correct: 0 },
        { q: "84. The poem 'Childhood' is about?", options: ["A) Lost innocence", "B) Growing up", "C) Both", "D) None"], correct: 2 },
        { q: "85. 'Father to Son' shows?", options: ["A) Communication gap", "B) Love", "C) Unity", "D) Conflict"], correct: 0 },
        { q: "86. Is 'Ranga's Marriage' humorous?", options: ["A) Yes", "B) No", "C) Rarely", "D) None"], correct: 0 },
        { q: "87. Why was Albert Einstein expelled?", options: ["A) Rebellion", "B) Failures", "C) Fights", "D) None"], correct: 0 },
        { q: "88. Who is the writer of 'Summer of Beautiful White Horse'?", options: ["A) William Saroyan", "B) Marga Minco", "C) Masti", "D) None"], correct: 0 },
        { q: "89. What was the color of the horse?", options: ["A) White", "B) Black", "C) Brown", "D) Grey"], correct: 0 },
        { q: "90. What is 'Mother's Day' play about?", options: ["A) Domestic issues", "B) Crime", "C) Adventure", "D) Science"], correct: 0 },
        { q: "91. Synonym of 'Beautiful'?", options: ["A) Gorgeous", "B) Ugly", "C) Bad", "D) Simple"], correct: 0 },
        { q: "92. Antonym of 'Happy'?", options: ["A) Sad", "B) Joyful", "C) Glad", "D) Fine"], correct: 0 },
        { q: "93. 'The' is which part of speech?", options: ["A) Article", "B) Noun", "C) Verb", "D) Adverb"], correct: 0 },
        { q: "94. Past tense of 'Go'?", options: ["A) Went", "B) Gone", "C) Going", "D) Goes"], correct: 0 },
        { q: "95. Plural of 'Child'?", options: ["A) Children", "B) Childs", "C) Childes", "D) None"], correct: 0 },
        { q: "96. Who wrote 'The Portrait of a Lady'?", options: ["A) Khushwant Singh", "B) Ruskin Bond", "C) Vikram Seth", "D) Tolstoy"], correct: 0 },
        { q: "97. 'Ailing Planet' reflects which issue?", options: ["A) Ecology", "B) Finance", "C) War", "D) Politics"], correct: 0 },
        { q: "98. The 'Laburnum Top' refers to?", options: ["A) The tree top", "B) A mountain", "C) The sky", "D) A bird"], correct: 0 },
        { q: "99. 'The Address' was written by?", options: ["A) Marga Minco", "B) William Saroyan", "C) Ranga", "D) None"], correct: 0 },
        { q: "100. How many questions did the King ask?", options: ["A) Three", "B) Two", "C) Four", "D) Five"], correct: 0 }
    ];

    let currentQuestionIndex = 0, score = 0, timeLeft = 7200, userAnswers = [], timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `Time: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(timeLeft <= 0) endQuiz();
        }, 1000);
    }

    function updateUI() {
        let qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `Question: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach((btn, i) => btn.innerText = qObj.options[i]);
    }

    function handleAnswer(selectedIndex) {
        userAnswers[currentQuestionIndex] = selectedIndex;
        if(selectedIndex === questions[currentQuestionIndex].correct) score++;
        
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            updateUI();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('score-summary').innerHTML = `Your Score: <b>${score} / ${questions.length}</b>`;

        let reviewHTML = "<h3>Review your mistakes:</h3><br>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `
                <div class="result-item">
                    <p><b>Q: ${questions[i].q}</b></p>
                    <p class="wrong">Your Answer: ${userAnswers[i] !== undefined ? questions[i].options[userAnswers[i]] : "Not Answered"}</p>
                    <p class="correct">Correct Answer: ${questions[i].options[questions[i].correct]}</p>
                </div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }

    updateUI();
    startTimer();
</script>
</body>
</html>
