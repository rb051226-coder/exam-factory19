        { q: "৭২. আর্থিক লক্ষ্য কী?", options: ["সম্পদ সর্বাধিকরণ", "মুনাফা সর্বাধিকরণ", "সবগুলো", "None"], correct: 2 },

        { q: "৭৪. বাণিজ্যিক পত্র কী?", options: ["স্বল্পমেয়াদী ঋণ", "দীর্ঘমেয়াদী", "None", "None"], correct: 0 },

        { q: "৭৭. পণ্যের জীবনচক্র কয়টি ধাপের?", options: ["৪টি", "২টি", "None", "None"], correct: 0 },
        { q: "৭৮. মধ্যস্থতাকারী কে?", options: ["ডিলার", "উৎপাদক", "None", "None"], correct: 0 },
        { q: "৭৯. ভোক্তা আদালতের ক্ষমতা কী?", options: ["বিচার করা", "পণ্য উৎপাদন", "None", "None"], correct: 0 },
        { q: "৮০. এনজিও কীসের সুরক্ষায় কাজ করে?", options: ["ভোক্তা", "সরকারি", "None", "None"], correct: 0 },
        { q: "৮১. ব্যবস্থাপনার কোন স্তর কর্মীদের সাথে কাজ করে?", options: ["নিম্নস্তর", "উচ্চস্তর", "None", "None"], correct: 0 },
        { q: "৮২. হেনরি ফায়োল কী ছিলেন?", options: ["খনি প্রকৌশলী", "ডাক্তার", "None", "None"], correct: 0 },
        { q: "৮৩. পরিকল্পনার অপরিহার্য শর্ত কী?", options: ["নমনীয়তা", "কঠোরতা", "None", "None"], correct: 0 },
        { q: "৮৪. কর্মী নির্বাচন কী?", options: ["নেতিবাচক প্রক্রিয়া", "ইতিবাচক", "None", "None"], correct: 0 },

        { q: "৮৬. কার্যকরী যোগাযোগ কী?", options: ["উভমুখী", "একমুখী", "None", "None"], correct: 0 },

        { q: "৯০. সেবি (SEBI) কোন সালে গঠিত হয়?", options: ["১৯৯২", "১৯৮০", "None", "None"], correct: 0 },
        { q: "৯১. পণ্য কী?", options: ["সেবা বা বস্তু", "শুধুমাত্র বস্তু", "None", "None"], correct: 0 },
        { q: "৯২. সেবা (Service) কী?", options: ["অস্পর্শনীয়", "স্পর্শনীয়", "None", "None"], correct: 0 },
        { q: "৯৩. দাম নির্ধারণের কৌশল কী?", options: ["চাহিদা ভিত্তিক", "খরচ ভিত্তিক", "সবগুলো", "None"], correct: 2 },
        { q: "৯৪. বিপণন পরিবেশ কী?", options: ["অভ্যন্তরীণ ও বাহ্যিক", "শুধু অভ্যন্তরীণ", "None", "None"], correct: 0 },

        { q: "৯৭. কর্মীসংস্থান কি ব্যবস্থাপনার অবিচ্ছেদ্য?", options: ["হ্যাঁ", "না", "None", "None"], correct: 0 },
        { q: "৯৮. প্রশাসনিক ব্যবস্থাপনা কে গড়েছেন?", options: ["হেনরি ফায়োল", "টেলর", "None", "None"], correct: 0 },
        { q: "৯৯. লক্ষ্য অর্জনের মূল কী?", options: ["সমন্বয়", "একাকীত্ব", "None", "None"], correct: 0 },
        { q: "১০০. ব্যবস্থাপনা কি বিজ্ঞান ও কলা?", options: ["উভয়ই", "শুধুমাত্র বিজ্ঞান", "None", "None"], correct: 0 }
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);

    let currentQuestionIndex = 0, score = 0, userAnswers = [];

    function init() {
        const container = document.getElementById('opt-container');
        const qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        container.innerHTML = '';
        qObj.options.forEach((opt, idx) => {
            if(opt !== "None") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx);
                container.appendChild(btn);
            }
        });
    }

    function handleAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        if(idx === questions[currentQuestionIndex].correct) score++;
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            init();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;
        let reviewHTML = "<h3 style='margin-bottom:15px; color:#38bdf8;'>সঠিক উত্তর মিলিয়ে নিন:</h3>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `<div class="result-item"><p><b>${questions[i].q}</b></p><p style='color:#f87171'>সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p></div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }
    window.onload = init;
</script>
