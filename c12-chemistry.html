    let current = 0, score = 0;
    
    function load() {
        if(current < questions.length) {
            document.getElementById('progress').innerText = `প্রশ্ন ${current+1}/১০০`;
            document.getElementById('q-text').innerText = questions[current].q;
            let optDiv = document.getElementById('options');
            optDiv.innerHTML = '';
            questions[current].options.forEach((o, i) => {
                let btn = document.createElement('button');
                btn.className = 'btn-opt';
                btn.innerText = o;
                btn.onclick = () => {
                    if(i === questions[current].correct) score++;
                    current++;
                    load();
                };
                optDiv.appendChild(btn);
            });
        } else {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('score-screen').style.display = 'block';
            document.getElementById('score-text').innerText = `স্কোর: ${score}/১০০`;
        }
    }
    load();
