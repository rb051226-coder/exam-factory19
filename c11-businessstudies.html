<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 11 Business Studies 100 Qs 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: #0b1120; color: #f1f5f9; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(17, 24, 39, 0.95); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 600px; margin: auto; padding: 25px; border: 1px solid #334155; }
        .brand-logo { font-size: 24px; font-weight: 700; color: #22c55e; text-align: center; margin-bottom: 25px; }
        .q-box { font-size: 22px; line-height: 1.6; margin-bottom: 25px; padding: 25px; background: rgba(255,255,255,0.03); border-left: 6px solid #22c55e; border-radius: 10px; color: #f8fafc; }
        .opt-btn { background: #1e293b; padding: 20px; margin-bottom: 12px; width: 100%; border-radius: 12px; border: 1px solid #334155; color: #e2e8f0; cursor: pointer; text-align: left; font-size: 20px; transition: 0.2s; }
        .opt-btn:hover { background: #334155; border-color: #22c55e; }
        .finish-btn { background: #166534; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; cursor: pointer; margin-top: 20px; font-size: 20px; font-weight: bold; }
        .result-item { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #ef4444; font-size: 18px; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">

        <div id="q-text" class="q-box">প্রশ্ন লোড হচ্ছে...</div>
        <div id="opt-container"></div>
        <button class="finish-btn" onclick="endQuiz()">পরীক্ষা শেষ করুন</button>
    </div>
    <div id="result-screen" class="screen">

        <div id="score-summary" style="text-align:center; font-size: 22px; margin: 15px 0;"></div>
        <div id="review-list"></div>
        <button class="finish-btn" onclick="location.reload()">আবার শুরু করুন</button>
    </div>
</div>

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);

    let currentQuestionIndex = 0, score = 0, userAnswers = [];

    function init() {
        const container = document.getElementById('opt-container');
        const qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        container.innerHTML = '';
        qObj.options.forEach((opt, idx) => {
            if(opt !== "None") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx);
                container.appendChild(btn);
            }
        });
    }

    function handleAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        if(idx === questions[currentQuestionIndex].correct) score++;
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            init();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;
        let reviewHTML = "<h3 style='margin-bottom:15px;'>সঠিক উত্তর মিলিয়ে নিন:</h3>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `<div class="result-item"><p><b>${questions[i].q}</b></p><p style='color:#f87171'>সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p></div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }
    window.onload = init;
</script>
