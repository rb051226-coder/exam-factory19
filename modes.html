<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | Exam Factory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #f3f4f6; --text: #111827; --card-bg: #ffffff; }
        body.dark-mode { --bg: #111827; --text: #f3f4f6; --card-bg: #1f2937; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .back-btn { background: #e5e7eb; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        
        .settings-card { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e5e7eb; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .btn-danger { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">← Back</button>
        <h2>Settings</h2>
    </div>

    <div class="settings-card">
        <span>Dark Mode</span>
        <button class="btn-action" onclick="toggleTheme()">Toggle</button>
    </div>

    <div class="settings-card">
        <span>Reset App Data</span>
        <button class="btn-danger" onclick="resetData()">Clear</button>
    </div>

    <div class="settings-card">
        <span>Logout</span>
        <button class="btn-danger" onclick="logout()">Exit</button>
    </div>
</div>

<script>
    // Theme logic (Dark Mode check)
    if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark-mode');
    
    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }

    // Reset Data (Important for fixing bugs)
    function resetData() {
        if(confirm("সব ডাটা কি রিসেট করতে চান?")) {
            localStorage.clear();
            alert("Data Reset! Please refresh.");
            window.location.href = 'index.html';
        }
    }

    // Logout logic
    function logout() {
        localStorage.removeItem('isLoggedIn');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
