<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 12 Economics 100 Qs 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: #0f172a; color: #f1f5f9; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 650px; margin: auto; padding: 25px; border: 1px solid #334155; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 24px; font-weight: 700; color: #38bdf8; text-align: center; margin-bottom: 25px; }
        .q-box { font-size: 20px; line-height: 1.6; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-left: 6px solid #38bdf8; border-radius: 10px; color: #f8fafc; }
        .opt-btn { background: #1e293b; padding: 18px; margin-bottom: 12px; width: 100%; border-radius: 10px; border: 1px solid #475569; color: #e2e8f0; cursor: pointer; text-align: left; font-size: 18px; transition: 0.2s; }
        .opt-btn:hover { background: #334155; border-color: #38bdf8; }
        .finish-btn { background: #0369a1; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 20px; font-size: 18px; font-weight: bold; }
        .result-item { background: #1e293b; padding: 12px; margin-bottom: 8px; border-radius: 8px; border-left: 4px solid #f87171; font-size: 16px; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">দ্বাদশ অর্থনীতি ১০০ কমন প্রশ্ন (২০২৬)</div>
    <div id="quiz-screen" class="screen active">
        <div id="q-count" style="margin-bottom:15px; color:#38bdf8; font-weight:bold;">প্রশ্ন: ১ / ১০০</div>
        <div id="q-text" class="q-box">প্রশ্ন লোড হচ্ছে...</div>
        <div id="opt-container"></div>
        <button class="finish-btn" onclick="endQuiz()">পরীক্ষা শেষ করুন</button>
    </div>
    <div id="result-screen" class="screen">
        <h2 style="text-align:center; color:#38bdf8; margin-bottom: 20px;">আপনার স্কোর</h2>
        <div id="score-summary" style="text-align:center; font-size: 20px; margin: 15px 0;"></div>
        <div id="review-list"></div>
        <button class="finish-btn" onclick="location.reload()">পুনরায় পরীক্ষা দিন</button>
    </div>
</div>

<script>

        { q: "১২. GDP = GNP - কী?", options: ["বিদেশি আয়", "অবচয়", "None", "None"], correct: 0 },

        { q: "৭৭. রিভার্স রেপো রেট?", options: ["জমা রাখার হার", "ঋণের হার", "None", "None"], correct: 0 },
        { q: "৭৮. রাজস্ব নীতি কী?", options: ["সরকারি আয়-ব্যয়", "মুদ্রা নীতি", "None", "None"], correct: 0 },
        { q: "৭৯. আমদানির প্রভাব?", options: ["মুদ্রা বহির্গমন", "অন্তর্গমন", "None", "None"], correct: 0 },
        { q: "৮০. রপ্তানির প্রভাব?", options: ["মুদ্রা অন্তর্গমন", "বহির্গমন", "None", "None"], correct: 0 },
        { q: "৮১. চাহিদার অস্থিতিস্থাপক পণ্য?", options: ["নিত্য প্রয়োজনীয়", "বিলাসী", "None", "None"], correct: 0 },
        { q: "৮২. চাহিদার স্থিতিস্থাপক পণ্য?", options: ["বিলাসী", "প্রয়োজনীয়", "None", "None"], correct: 0 },
        { q: "৮৩. উৎপাদন রেখা?", options: ["উৎপাদনসম্ভাবনা", "চাহিদা", "None", "None"], correct: 0 },
        { q: "৮৪. ফার্ম ও শিল্পের পার্থক্য?", options: ["ফার্ম ছোট, শিল্প বড়", "সমান", "None", "None"], correct: 0 },
        { q: "৮৫. দীর্ঘকালীন ভারসাম্য?", options: ["অস্বাভাবিক মুনাফা শূন্য", "অস্বাভাবিক", "None", "None"], correct: 0 },
        { q: "৮৬. দামের বৈষম্য কেন?", options: ["মুনাফা বাড়াতে", "কমাতে", "None", "None"], correct: 0 },
        { q: "৮৭. জাতীয় আয় = কী?", options: ["C + I + G + (X-M)", "C+I+G", "None", "None"], correct: 0 },
        { q: "৮৮. বিনিয়োগ গুণক?", options: ["1/MPS", "1/MPC", "None", "None"], correct: 0 },
        { q: "৮৯. অর্থের চাহিদা কেন?", options: ["লেনদেন ও সাবধানতা", "ভোগ", "None", "None"], correct: 0 },
        { q: "৯০. ব্যাংক ড্রাফট কী?", options: ["অর্থের দলিল", "মুদ্রা", "None", "None"], correct: 0 },
        { q: "৯১. বাজেট সারপ্লাস?", options: ["আয় > ব্যয়", "ব্যয় > আয়", "None", "None"], correct: 0 },
        { q: "৯২. BOP এর ভারসাম্য কেন?", options: ["রপ্তানি = আমদানি", "অসম", "None", "None"], correct: 0 },
        { q: "৯৩. অর্থনৈতিক কল্যাণ?", options: ["উন্নয়নের লক্ষ্য", "আয়ের লক্ষ্য", "None", "None"], correct: 0 },
        { q: "৯৪. মুদ্রাস্ফীতি পরিমাপ?", options: ["WPI/CPI", "GDP", "None", "None"], correct: 0 },
        { q: "৯৫. সরকারি ব্যয় বৃদ্ধি?", options: ["চাহিদা বাড়ে", "কমে", "None", "None"], correct: 0 },
        { q: "৯৬. ট্যাক্স রেট বৃদ্ধি?", options: ["ভোগ কমে", "বাড়ে", "None", "None"], correct: 0 },
        { q: "৯৭. অর্থনৈতিক মন্দা?", options: ["চাহিদা সংকট", "উৎপাদন", "None", "None"], correct: 0 },
        { q: "৯৮. মূলধনের কাম্য ব্যবহার?", options: ["দক্ষতা বাড়ায়", "কমায়", "None", "None"], correct: 0 },
        { q: "৯৯. বাজার অর্থনীতির সমস্যা?", options: ["অসমতা", "সমতা", "None", "None"], correct: 0 },
        { q: "১০০. অর্থনীতির প্রধান ভিত্তি?", options: ["সম্পদ ও অভাব", "দাম", "None", "None"], correct: 0 }
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);
    
    let currentQuestionIndex = 0, score = 0, userAnswers = [];

    function init() {
        const container = document.getElementById('opt-container');
        const qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        container.innerHTML = '';
        qObj.options.forEach((opt, idx) => {
            if(opt !== "None") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx);
                container.appendChild(btn);
            }
        });
    }

    function handleAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        if(idx === questions[currentQuestionIndex].correct) score++;
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            init();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;
        let reviewHTML = "<h3 style='margin-bottom:15px; color:#38bdf8;'>সঠিক উত্তর মিলিয়ে নিন:</h3>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `<div class="result-item"><p><b>${questions[i].q}</b></p><p style='color:#f87171'>সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p></div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }
    window.onload = init;
</script>
</body>
</html>
