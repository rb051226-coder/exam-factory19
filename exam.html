<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Factory - Full Mock Test</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
text-align:center;
padding:20px;
}

.box{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
max-width:700px;
margin:auto;
backdrop-filter:blur(10px);
}

button{
padding:10px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
background:#2563eb;
color:white;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">

<div class="top">
<p id="qno">Question 1</p>
<p id="timer">60:00</p>
</div>

<h3 id="question">Loading...</h3>

<div id="options"></div>

<p id="result"></p>

</div>

<script>

// 🔥 50 Questions System (sample structure)
let questions = Array.from({length:50}, (_,i)=>({
q:`Sample Question ${i+1}: West Bengal Board Practice`,
o:["Option A","Option B","Option C","Option D"],
a: Math.floor(Math.random()*4)
}));

let index = 0;
let score = 0;
let time = 3600;

function loadQuestion(){

let q = questions[index];

document.getElementById("qno").innerText = "Question "+(index+1)+"/50";
document.getElementById("question").innerText = q.q;

let optDiv = document.getElementById("options");
optDiv.innerHTML="";

q.o.forEach((val,i)=>{
let btn = document.createElement("button");
btn.innerText = val;
btn.onclick = ()=>checkAnswer(i);
optDiv.appendChild(btn);
});
}

function checkAnswer(i){

if(i === questions[index].a){
score++;
}

index++;

if(index < questions.length){
loadQuestion();
}else{
showResult();
}
}

function showResult(){
document.getElementById("question").innerText="Exam Finished 🎉";
document.getElementById("options").innerHTML="";
document.getElementById("result").innerHTML=
"Score: "+score+"/50<br>Percentage: "+(score*2)+"%";
}

setInterval(()=>{
let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerText=
m+":"+String(s).padStart(2,"0");

if(time>0) time--;
},1000);

loadQuestion();

</script>

</body>
</html>
