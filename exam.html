<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Factory Test</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:15px;
max-width:700px;
margin:auto;
}

button{
padding:10px 15px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
display:block;
width:100%;
}
</style>
</head>

<body>

<div class="box">

<h2>Exam Factory Mock Test</h2>

<p id="timer">Time: 60:00</p>

<div id="question">লোড হচ্ছে...</div>

<div id="options"></div>

<p id="result"></p>

</div>

<script>

let questions = [
{
q:"ভারতের রাজধানী কী?",
o:["কলকাতা","মুম্বাই","নতুন দিল্লি","চেন্নাই"],
a:2
},
{
q:"2+2 কত?",
o:["3","4","5","6"],
a:1
},
{
q:"বাংলাদেশের রাজধানী কী?",
o:["ঢাকা","চট্টগ্রাম","খুলনা","রাজশাহী"],
a:0
}
];

let index = 0;
let score = 0;
let time = 3600;

function loadQ(){
let q = questions[index];

document.getElementById("question").innerText = (index+1)+". "+q.q;

let opt = document.getElementById("options");
opt.innerHTML="";

q.o.forEach((val,i)=>{
let btn = document.createElement("button");
btn.innerText = val;
btn.onclick = ()=>check(i);
opt.appendChild(btn);
});
}

function check(i){
if(i === questions[index].a){
score++;
}

index++;

if(index < questions.length){
loadQ();
}else{
document.getElementById("question").innerText = "Test Finished";
document.getElementById("options").innerHTML="";
document.getElementById("result").innerText = "Your Score: "+score+"/"+questions.length;
}
}

setInterval(()=>{
let m = Math.floor(time/60);
let s = time%60;
document.getElementById("timer").innerText =
"Time: "+m+":"+String(s).padStart(2,"0");

if(time>0) time--;
},1000);

loadQ();

</script>

</body>
</html>
