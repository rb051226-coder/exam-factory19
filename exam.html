<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Factory - Final System</title>

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f172a,#1e3a8a);
color:white;
text-align:center;
padding:20px;
}

.box{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:15px;
max-width:750px;
margin:auto;
backdrop-filter:blur(10px);
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
width:100%;
background:#2563eb;
color:white;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

select{
padding:10px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h2>EXAM FACTORY MOCK TEST</h2>

<!-- SUBJECT + DIFFICULTY -->
<select id="subject">
<option>বাংলা</option>
<option>English</option>
<option>Mathematics</option>
<option>History</option>
<option>Geography</option>
<option>Science</option>
</select>

<select id="level">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<div class="top">
<p id="qno">Question 1/50</p>
<p id="timer">60:00</p>
</div>

<h3 id="question">লোড হচ্ছে...</h3>

<div id="options"></div>

<p id="result"></p>

</div>

<script>

// 🔥 FULL 50 QUESTIONS SYSTEM (Demo Structure)
let questions = [];

function generateQuestions(subject, level){
questions = Array.from({length:50}, (_,i)=>({
q:`${subject} (${level}) Question ${i+1}`,
o:["Option A","Option B","Option C","Option D"],
a: Math.floor(Math.random()*4)
}));
}

let index = 0;
let score = 0;
let time = 3600;

// start exam
function startExam(){
let subject = document.getElementById("subject").value;
let level = document.getElementById("level").value;

generateQuestions(subject, level);
loadQuestion();
}

function loadQuestion(){
let q = questions[index];

document.getElementById("qno").innerText = "Question "+(index+1)+"/50";
document.getElementById("question").innerText = q.q;

let optDiv = document.getElementById("options");
optDiv.innerHTML="";

q.o.forEach((val,i)=>{
let btn = document.createElement("button");
btn.innerText = val;
btn.onclick = ()=>check(i);
optDiv.appendChild(btn);
});
}

function check(i){
if(i === questions[index].a){
score++;
}

index++;

if(index < questions.length){
loadQuestion();
}else{
document.getElementById("question").innerText="Exam Finished 🎉";
document.getElementById("options").innerHTML="";
localStorage.setItem("score", score);
window.location.href = "result.html";
}
}

// timer
setInterval(()=>{
let m = Math.floor(time/60);
let s = time%60;

document.getElementById("timer").innerText=
m+":"+String(s).padStart(2,"0");

if(time>0) time--;
},1000);

// auto start
startExam();

</script>

</body>
</html>
