        { q: "৮৪. মনোপসনি বাজারে?", options: ["একজন ক্রেতা", "একজন বিক্রেতা", "None", "None"], correct: 0 },
        { q: "৮৫. জাতীয় আয় পরিমাপের পদ্ধতি?", options: ["তিনটি", "দুটি", "None", "None"], correct: 0 },
        { q: "৮৬. মাথাপিছু আয় কী নির্দেশ করে?", options: ["গড় আয়", "মোট আয়", "None", "None"], correct: 0 },
        { q: "৮৭. সঞ্চয় প্রবণতা কী?", options: ["সঞ্চয়/আয়", "আয়/সঞ্চয়", "None", "None"], correct: 0 },
        { q: "৮৮. ভোগ প্রবণতা কী?", options: ["ভোগ/আয়", "আয়/ভোগ", "None", "None"], correct: 0 },
        { q: "৮৯. গুণক (Multiplier) কী?", options: ["বিনিয়োগের প্রভাব", "খরচ", "None", "None"], correct: 0 },
        { q: "৯০. ত্বরণ (Accelerator) কী?", options: ["উৎপাদন প্রভাব", "মুনাফা", "None", "None"], correct: 0 },
        { q: "৯১. মুদ্রার বিবর্তন?", options: ["বস্তু-মুদ্রা থেকে কাগজ", "কাগজ থেকে বস্তু", "None", "None"], correct: 0 },
        { q: "৯২. কেন্দ্রীয় ব্যাংকের কাজ?", options: ["মুদ্রা ছাপানো", "ব্যক্তি ঋণ", "None", "None"], correct: 0 },
        { q: "৯৩. বাণিজ্য ব্যাংক কী করে?", options: ["আমানত গ্রহণ", "মুদ্রা ছাপানো", "None", "None"], correct: 0 },
        { q: "৯৪. করের লক্ষ্য?", options: ["রাজস্ব বৃদ্ধি", "দাম বৃদ্ধি", "None", "None"], correct: 0 },
        { q: "৯৫. ভর্তুকি কী?", options: ["আর্থিক সাহায্য", "কর", "None", "None"], correct: 0 },
        { q: "৯৬. বেসরকারিকরণ কী?", options: ["ব্যক্তি মালিকানা", "সরকারি মালিকানা", "None", "None"], correct: 0 },
        { q: "৯৭. বিশ্বায়ন কী?", options: ["বাজার উন্মুক্তকরণ", "বন্ধ করা", "None", "None"], correct: 0 },
        { q: "৯৮. এলপিজি (LPG) নীতি?", options: ["১৯৯১", "১৯৪৭", "None", "None"], correct: 0 },
        { q: "৯৯. ভারতের অর্থনীতি?", options: ["মিশ্র", "সমাজতান্ত্রিক", "None", "None"], correct: 0 },
        { q: "১০০. অর্থনীতির মূল লক্ষ্য?", options: ["কল্যান সাধন", "মুনাফা", "None", "None"], correct: 0 }
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);
    
    let currentQuestionIndex = 0, score = 0, userAnswers = [];

    function init() {
        const container = document.getElementById('opt-container');
        const qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        container.innerHTML = '';
        qObj.options.forEach((opt, idx) => {
            if(opt !== "None") {
                const btn = document.createElement('button');
                btn.className = 'opt-btn';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(idx);
                container.appendChild(btn);
            }
        });
    }

    function handleAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        if(idx === questions[currentQuestionIndex].correct) score++;
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            init();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;
        let reviewHTML = "<h3 style='margin-bottom:15px;'>সঠিক উত্তর:</h3>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `<div class="result-item"><p><b>${questions[i].q}</b></p><p style='color:#f87171'>সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p></div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }
    window.onload = init;
</script>
</body>
</html>
