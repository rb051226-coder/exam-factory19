<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Class 12 Accountancy 100 Qs 2026</title>
    <style>

        body { background: #1e293b; color: #f1f5f9; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(15, 23, 42, 0.95); border-radius: 15px; width: 100%; max-width: 700px; margin: auto; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); border: 1px solid #334155; }
        .brand-logo { font-size: 20px; font-weight: 700; color: #38bdf8; text-align: center; margin-bottom: 20px; }
        .q-box { font-size: 17px; margin-bottom: 20px; padding: 18px; background: rgba(255,255,255,0.03); border-left: 4px solid #38bdf8; border-radius: 6px; }
        .opt-btn { background: #334155; padding: 10px; margin-bottom: 6px; width: 100%; border-radius: 5px; border: none; color: white; cursor: pointer; text-align: left; transition: 0.2s; }
        .opt-btn:hover { background: #475569; border-left: 4px solid #38bdf8; }
        .finish-btn { background: #0ea5e9; color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; margin-top: 20px; font-weight: 600; }
        .result-item { background: #0f172a; padding: 10px; margin-bottom: 8px; border-radius: 4px; border-left: 3px solid #ef4444; font-size: 0.9em; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">

        <div id="opt-container"></div>

    </div>
    <div id="result-screen" class="screen">

        <div id="score-summary" style="text-align:center; font-size: 18px; margin: 15px 0;"></div>

    </div>
</div>

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);

    let currentQuestionIndex = 0, score = 0, userAnswers = [];

    function init() {
        const container = document.getElementById('opt-container');
        const qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        container.innerHTML = '';
        qObj.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(idx);
            container.appendChild(btn);
        });
    }

    function handleAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        if(idx === questions[currentQuestionIndex].correct) score++;
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            init();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;
        let reviewHTML = "<h3>ভুলগুলো যাচাই করুন:</h3><br>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `<div class="result-item"><p><b>${questions[i].q}</b></p><p style="color:#f87171">আপনার উত্তর: ${userAnswers[i] !== undefined ? questions[i].options[userAnswers[i]] : "উত্তর দেননি"}</p><p style="color:#4ade80">সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p></div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }
    window.onload = init;
</script>
