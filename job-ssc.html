<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSC GD Practice - Exam Factory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');
        body { background: #0b0e14; color: #f8fafc; font-family: 'Outfit', sans-serif; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 20px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .question-box { margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .option { display: block; margin: 8px 0; padding: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid #334155; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .correct { background: #064e3b !important; border-color: #10b981 !important; color: #fff; }
        .wrong { background: #7f1d1d !important; border-color: #ef4444 !important; color: #fff; }
        .btn-action { width: 100%; padding: 15px; background: linear-gradient(135deg, #8b5cf6, #4f46e5); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="glass-card">
    <a href="index.html" style="color:#8b5cf6; text-decoration:none;">← ফিরে যান</a>
    <h2 style="margin-top:10px;">SSC GD Practice Set</h2>
    <div id="quiz-container"></div>
    <button class="btn-action" onclick="checkAnswers()">ফলাফল দেখুন</button>
    <div id="result-text" style="margin-top:20px; font-weight:bold; text-align:center; font-size:1.2rem;"></div>
</div>

<script>
    // গুরুত্বপূর্ণ: আপনার কোডে একটি লগইন চেক ছিল। 
    // যদি আপনি এটি সরাসরি ব্রাউজারে টেস্ট করতে চান, তবে নিচের লাইনটি কমেন্ট (//) করে রাখতে পারেন।
    // if (localStorage.getItem('isLoggedIn') !== 'true') {
    //     window.location.href = 'index.html';
    // }

    const questions = [
        { q: "25 × 4 = ?", a: ["80", "90", "100", "120"], correct: 2 },
        { q: "ভারতের জাতীয় সঙ্গীত কে রচনা করেন?", a: ["বঙ্কিমচন্দ্র", "রবীন্দ্রনাথ ঠাকুর", "নজরুল", "বিদ্যাসাগর"], correct: 1 },
        { q: "15 + 18 = ?", a: ["31", "32", "33", "34"], correct: 2 },
        { q: "সংবিধান কার্যকর হয় কবে?", a: ["15 Aug 1947", "26 Jan 1950", "26 Jan 1947", "2 Oct 1950"], correct: 1 },
        { q: "Series: 2,4,8,16,?", a: ["24", "30", "32", "34"], correct: 2 },
        { q: "144 ÷ 12 = ?", a: ["10", "11", "12", "13"], correct: 2 },
        { q: "ভারতের রাজধানী?", a: ["মুম্বাই", "কলকাতা", "নয়াদিল্লি", "চেন্নাই"], correct: 2 },
        { q: "7² = ?", a: ["42", "48", "49", "56"], correct: 2 },
        { q: "রক্তের লাল রঙের কারণ?", a: ["প্লাজমা", "হিমোগ্লোবিন", "WBC", "প্লেটলেট"], correct: 1 },
        { q: "8,16,24,32,?", a: ["36", "38", "40", "42"], correct: 2 },
        { q: "50% of 200 = ?", a: ["50", "75", "100", "150"], correct: 2 },
        { q: "ভারতের জাতীয় পশু?", a: ["সিংহ", "বাঘ", "হাতি", "ময়ূর"], correct: 1 },
        { q: "11 × 11 = ?", a: ["111", "121", "131", "141"], correct: 1 },
        { q: "পৃথিবীর উপগ্রহ?", a: ["সূর্য", "চাঁদ", "মঙ্গল", "শুক্র"], correct: 1 },
        { q: "1 km = ?", a: ["100 m", "1000 m", "10000 m", "10 m"], correct: 1 },
        { q: "ভারতের প্রথম রাষ্ট্রপতি কে ছিলেন?", a: ["রাজেন্দ্র প্রসাদ", "জওহরলাল নেহরু", "সর্দার প্যাটেল", "বি আর আম্বেদকর"], correct: 0 },
        { q: "জাপানের মুদ্রার নাম কি?", a: ["ইউরো", "ডলার", "ইয়েন", "পেসো"], correct: 2 },
        { q: "‘ডিসকভারি অফ ইন্ডিয়া’ কার লেখা?", a: ["গান্ধী", "নেহরু", "প্যাটেল", "আম্বেদকর"], correct: 1 },
        { q: "ফ্রান্সের রাজধানীর নাম কি?", a: ["বার্লিন", "প্যারিস", "রোম", "মাদ্রিদ"], correct: 1 },
        { q: "ভারতের জাতীয় পশু কোনটি?", a: ["সিংহ", "হাতি", "বাঘ", "ময়ূর"], correct: 2 },
        { q: "রবীন্দ্রনাথ ঠাকুর কত সালে নোবেল পান?", a: ["১৯১১", "১৯১৩", "১৯১৫", "১৯১৭"], correct: 1 },
        { q: "পৃথিবীর বৃহত্তম মহাসাগর কোনটি?", a: ["আটলান্টিক", "ভারত মহাসাগর", "প্রশান্ত মহাসাগর", "আর্কটিক"], correct: 2 },
        { q: "কবে ভারত স্বাধীন হয়?", a: ["১৫ আগস্ট ১৯৪৭", "২৬ জানুয়ারি ১৯৫০", "১৫ আগস্ট ১৯৪৬", "২৬ জানুয়ারি ১৯৪৭"], correct: 0 },
        { q: "সোনার রাসায়নিক প্রতীক কি?", a: ["Ag", "Au", "Fe", "Cu"], correct: 1 },
        { q: "বাতাসে শব্দের গতি কত (প্রায়)?", a: ["৩০০ মি/সে", "৩৪৩ মি/সে", "৪০০ মি/সে", "২৫০ মি/সে"], correct: 1 },
        { q: "সবুজ গ্রহ বলা হয় কাকে?", a: ["পৃথিবী", "ইউরেনাস", "নেপচুন", "মঙ্গল"], correct: 1 },
        { q: "হাঁসিতে কোন গ্যাস নির্গত হয়?", a: ["নাইট্রাস অক্সাইড", "কার্বন ডাই অক্সাইড", "মিথেন", "অক্সিজেন"], correct: 0 },
        { q: "ভারতের সংবিধানের জনক কে?", a: ["নেহরু", "আম্বেদকর", "গান্ধী", "প্যাটেল"], correct: 1 }
    ];

    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    const shuffledQuestions = shuffle([...questions]);
    const container = document.getElementById('quiz-container');

    function loadQuiz() {
        container.innerHTML = "";
        shuffledQuestions.forEach((item, index) => {
            let optionsHTML = item.a.map((opt, i) => 
                `<label class="option" id="q${index}_opt${i}">
                    <input type="radio" name="q${index}" value="${i}"> ${opt}
                </label>`
            ).join('');
            
            container.innerHTML += `
                <div class="question-box">
                    <p><strong>${index + 1}. ${item.q}</strong></p>
                    ${optionsHTML}
                </div>
            `;
        });
    }

    function checkAnswers() {
        let score = 0;
        shuffledQuestions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            document.getElementById(`q${index}_opt${item.correct}`).classList.add('correct');
            
            if (selected) {
                if (parseInt(selected.value) === item.correct) {
                    score++;
                } else {
                    document.getElementById(`q${index}_opt${selected.value}`).classList.add('wrong');
                }
            }
        });
        document.getElementById('result-text').innerText = `আপনার স্কোর: ${score} / ${shuffledQuestions.length}`;
        window.scrollTo(0, 0); 
    }

    loadQuiz();
</script>
</body>
</html>
