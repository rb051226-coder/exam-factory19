    { q: "রিজনিং: হাত : ঘড়ি :: আঙুল : ?", a: ["আংটি", "নখ", "চামড়া", "হাড়"], correct: 0 },
    { q: "রিজনিং: ডাক্তার : রোগী :: শিক্ষক : ?", a: ["বই", "স্কুল", "ছাত্র", "শিক্ষা"], correct: 2 },
    { q: "রিজনিং: বেমানান শব্দটি খুঁজে বের কর: সূর্য, পৃথিবী, চাঁদ, তারা", a: ["সূর্য", "পৃথিবী", "চাঁদ", "তারা"], correct: 2 },
    { q: "রিজনিং: ৯, ২৫, ৪৯, ৮১, ?", a: ["১০০", "১২১", "১৪৪", "১৬৯"], correct: 1 },
    { q: "রিজনিং: আকাশ : নীল :: ঘাস : ?", a: ["লাল", "সবুজ", "হলুদ", "কালো"], correct: 1 },
    { q: "রিজনিং: বিড়াল : মিউ :: কুকুর : ?", a: ["ঘেউ", "গর্জন", "ডাক", "চিৎকার"], correct: 0 },
    { q: "রিজনিং: গাড়ি : পেট্রোল :: মানুষ : ?", a: ["জল", "খাবার", "বাতাস", "ঘুম"], correct: 1 },
    { q: "রিজনিং: ১, ৩, ৬, ১০, ১৫, ?", a: ["১৮", "২০", "২১", "২২"], correct: 2 },
    { q: "রিজনিং: বই : পাঠাগার :: জাহাজ : ?", a: ["বন্দর", "জল", "নৌকা", "সাগর"], correct: 0 },
    { q: "রিজনিং: কলম : লেখক :: ছুরি : ?", a: ["রাঁধুনি", "কসাই", "কার্পেন্টার", "ডাক্তার"], correct: 1 },
    { q: "রিজনিং: ২, ৫, ১০, ১৭, ২৬, ?", a: ["৩৫", "৩৭", "৩৯", "৪১"], correct: 1 },
    { q: "রিজনিং: বন্ধু : শত্রু :: শান্তি : ?", a: ["যুদ্ধ", "অশান্তি", "প্রেম", "রাগ"], correct: 1 },
    { q: "রিজনিং: ১, ৮, ১৫, ২২, ২৯, ?", a: ["৩৬", "৩৫", "৩৮", "৪০"], correct: 0 },
    { q: "রিজনিং: চশমা : চোখ :: জুতো : ?", a: ["পা", "হাঁটু", "হাত", "মাথা"], correct: 0 },
    { q: "রিজনিং: ৫, ৭, ১১, ১৩, ১৭, ?", a: ["১৮", "১৯", "২০", "২১"], correct: 1 },
    { q: "রিজনিং: ঘড়ি : সময় :: থার্মোমিটার : ?", a: ["বাতাস", "চাপ", "তাপমাত্রা", "উচ্চতা"], correct: 2 },
    { q: "রিজনিং: A, D, G, J, ?", a: ["K", "L", "M", "N"], correct: 2 },
    { q: "রিজনিং: কলম : কালি :: টায়ার : ?", a: ["রাবার", "হাওয়া", "চাকা", "গাড়ি"], correct: 1 }
    ];

    // রেন্ডমলি প্রশ্ন সাজানো
    function shuffle(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    const shuffledQuestions = shuffle([...questions]);
    const container = document.getElementById('quiz-container');

    function loadQuiz() {
        container.innerHTML = "";
        shuffledQuestions.forEach((item, index) => {
            let optionsHTML = item.a.map((opt, i) => 
                `<label class="option" id="q${index}_opt${i}">
                    <input type="radio" name="q${index}" value="${i}"> ${opt}
                </label>`
            ).join('');
            
            container.innerHTML += `
                <div class="question-box">
                    <p><strong>${index + 1}. ${item.q}</strong></p>
                    ${optionsHTML}
                </div>
            `;
        });
    }

    function checkAnswers() {
        let score = 0;
        shuffledQuestions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            document.getElementById(`q${index}_opt${item.correct}`).classList.add('correct');
            
            if (selected) {
                if (parseInt(selected.value) === item.correct) {
                    score++;
                } else {
                    document.getElementById(`q${index}_opt${selected.value}`).classList.add('wrong');
                }
            }
        });
        document.getElementById('result-text').innerText = `আপনার স্কোর: ${score} / ${shuffledQuestions.length}`;
        window.scrollTo(0, 0); 
    }

    loadQuiz();
</script>
