<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SSC GD Test</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; }
    </style>
</head>
<body>
    <div id="debug-area">
        <h1>SSC GD Practice</h1>
        <p>যদি এটি দেখতে পান, তবে স্ক্রিপ্ট কাজ করছে!</p>
    </div>

    <script>
        console.log("Script is running!");
        document.getElementById('debug-area').innerHTML += "<p>Script execution started...</p>";
        
        try {
            const questions = [
                { q: "ভারতের সংবিধানের জনক কে?", a: ["জওহরলাল নেহরু", "বি আর আম্বেদকর", "মহাত্মা গান্ধী", "বল্লভভাই প্যাটেল"], correct: 1 }
            ];
            document.getElementById('debug-area').innerHTML += "<p>Questions loaded successfully: " + questions.length + "</p>";
        } catch (e) {
            document.getElementById('debug-area').innerHTML += "<p style='color:red;'>Error: " + e.message + "</p>";
        }
    </script>
</body>
</html>
