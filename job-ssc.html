    const container = document.getElementById('quiz-container');

    function loadQuiz() {
        container.innerHTML = ""; // Loading টেক্সট মুছে ফেলবে
        questions.forEach((item, index) => {
            let optionsHTML = item.a.map((opt, i) => 
                `<label class="option"><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`
            ).join('');
            
            container.innerHTML += `
                <div class="question-box">
                    <p><strong>${index + 1}. ${item.q}</strong></p>
                    ${optionsHTML}
                </div>
            `;
        });
    }

    // পেজ লোড হওয়ার পর quiz লোড করবে
    loadQuiz();
