<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Class 11 Bengali 100 Marks Mega Mock Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); width: 100%; max-width: 750px; padding: 40px 30px; text-align: center;
        }
        .brand-logo {
            font-size: 30px; font-weight: 800; text-transform: uppercase;
            background: linear-gradient(to right, #38bdf8, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .quiz-meta {
            display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: 600;
            background: rgba(0,0,0,0.2); padding: 12px 20px; border-radius: 12px;
        }
        #timer { color: #f43f5e; }
        .q-box {
            font-size: 18px; text-align: left; margin-bottom: 25px; line-height: 1.6;
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 14px; border-left: 5px solid #38bdf8;
        }
        .opt-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: rgba(255, 255, 255, 0.05); border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 16px; border-radius: 12px; color: white; text-align: left; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .opt-btn:hover { background: rgba(255, 255, 255, 0.15); border-color: #38bdf8; transform: translateX(5px); }
        .btn-3d {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none;
            padding: 16px 32px; font-size: 16px; font-weight: 600; border-radius: 14px; cursor: pointer;
            box-shadow: 0 6px 0 #1e40af; transition: 0.1s; display: inline-block; margin-top: 20px; text-decoration: none;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 #1e40af; }
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">Exam Factory ➔ একাদশ শ্রেণী বাংলা (১০০ নম্বর)</div>

    <div id="quiz-screen" class="screen active">
        <div class="quiz-meta">
            <span id="q-count" style="color:#38bdf8;">প্রশ্ন: ১ / ১০০</span>
            <span id="timer">সময়: ১০০:০০</span>
        </div>
        <div class="q-box" id="q-text">প্রশ্ন লোড হচ্ছে...</div>
        <div class="opt-grid">
            <button class="opt-btn" onclick="handleAnswer(0)"></button>
            <button class="opt-btn" onclick="handleAnswer(1)"></button>
            <button class="opt-btn" onclick="handleAnswer(2)"></button>
            <button class="opt-btn" onclick="handleAnswer(3)"></button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="color: #4ade80; font-size: 28px; margin-bottom: 15px;">🎉 মেগা মক টেস্ট সম্পূর্ণ!</h2>
        <p id="result-details" style="font-size: 18px; margin-bottom: 30px; color:#cbd5e1;"></p>
        <a href="index.html" class="btn-3d">প্রধান ড্যাশবোর্ডে ফিরুন</a>
    </div>
</div>

<script>

        { q: "৫. ভূতের রাজত্বে আর যাই থাক, কী ছিল না?", options: ["ক) ভাবনা", "খ) শান্তি", "গ) শাসন", "ঘ) উদাসীনতা"], correct: 0 },
        { q: "৬. 'খাজনা দেব কিসে?'— প্রশ্নটি কার কাছে করা হয়েছিল?", options: ["ক) কর্তার কাছে", "খ) ভূতের নায়েবের কাছে", "গ) ওঝার কাছে", "ঘ) খিরোদবাবুর কাছে"], correct: 1 },
