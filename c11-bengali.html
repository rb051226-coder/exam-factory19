<!DOCTYPE html>

<head>

    <style>
         /* তোমার দেওয়া স্টাইলসমূহ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 800px; margin: auto; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 24px; font-weight: 700; color: #fb7185; text-align: center; margin-bottom: 20px; }
        .q-box { font-size: 18px; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-left: 5px solid #38bdf8; border-radius: 8px; }
        .opt-btn { background: #1e293b; padding: 12px; margin-bottom: 8px; width: 100%; border-radius: 8px; border: 1px solid #334155; color: white; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .opt-btn:hover { background: #334155; border-color: #38bdf8; }
        .finish-btn { background: #ef4444; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* ব্যাক বাটনের জন্য বাড়তি স্টাইল */
        .back-btn { background: rgba(255,255,255,0.1); border: 1px solid #334155; color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-bottom: 20px; display: inline-block; }
        .back-btn:hover { background: #334155; }
        h2 { text-align: center; margin-bottom: 10px; }
    </style>
</head>

    <div id="quiz-screen" class="screen active">

        </div>
        <div id="q-text" class="q-box">Loading...</div>
        <div id="opt-container">

            <button class="opt-btn" onclick="handleAnswer(2)"></button>

        </div>
        <button class="finish-btn" onclick="endQuiz()">পরীক্ষা শেষ করুন</button>
    </div>

</div>

    let currentQuestionIndex = 0, score = 0, timeLeft = 7200, userAnswers = [], timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `সময়: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(timeLeft <= 0) endQuiz();
        }, 1000);
    }

    function updateUI() {
        let qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach((btn, i) => btn.innerText = qObj.options[i]);
    }

    function handleAnswer(selectedIndex) {
        userAnswers[currentQuestionIndex] = selectedIndex;
        if(selectedIndex === questions[currentQuestionIndex].correct) score++;
        
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            updateUI();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;

        let reviewHTML = "<h3>ভুল সংশোধনী (Review):</h3><br>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `
                <div class="result-item">
                    <p><b>প্রশ্ন: ${questions[i].q}</b></p>
                    <p class="wrong">আপনার উত্তর: ${userAnswers[i] !== undefined ? questions[i].options[userAnswers[i]] : "উত্তর দেননি"}</p>
                    <p class="correct">সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p>
                </div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }

    updateUI();
    startTimer();
</script>
