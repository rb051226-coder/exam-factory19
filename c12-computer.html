<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class 12 Computer App Quiz 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Hind Siliguri', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 800px; margin: auto; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #10b981; }
        .brand-logo { font-size: 22px; font-weight: 700; color: #10b981; text-align: center; margin-bottom: 20px; }
        .q-box { font-size: 18px; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-left: 5px solid #10b981; border-radius: 8px; }
        .opt-btn { background: #1e293b; padding: 12px; margin-bottom: 8px; width: 100%; border-radius: 6px; border: 1px solid #334155; color: white; cursor: pointer; text-align: left; transition: 0.2s; }
        .opt-btn:hover { background: #334155; border-color: #10b981; }
        .finish-btn { background: #065f46; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        .result-item { background: #1e293b; padding: 10px; margin-bottom: 8px; border-radius: 5px; border-left: 4px solid #ef4444; font-size: 0.9em; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">দ্বাদশ শ্রেণি কম্পিউটার অ্যাপ্লিকেশন সাজেশন (২০২৬)</div>
    <div id="quiz-screen" class="screen active">
        <div id="q-count" style="margin-bottom:10px; color:#10b981;">প্রশ্ন: ১ / ১০০</div>
        <div id="q-text" class="q-box">প্রশ্ন লোড হচ্ছে...</div>
        <div id="opt-container"></div>
        <button class="finish-btn" onclick="endQuiz()">পরীক্ষা শেষ করুন</button>
    </div>
    <div id="result-screen" class="screen">
        <h2 style="text-align:center; color:#10b981;">ফলাফল</h2>
        <div id="score-summary" style="text-align:center; font-size: 20px; margin: 15px 0;"></div>
        <div id="review-list"></div>
        <button class="finish-btn" onclick="location.reload()">পুনরায় শুরু করুন</button>
    </div>
</div>

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    shuffleArray(questions);

    let currentQuestionIndex = 0, score = 0, userAnswers = [];

    function init() {
        const container = document.getElementById('opt-container');
        const qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        container.innerHTML = '';
        qObj.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt;
            btn.onclick = () => handleAnswer(idx);
            container.appendChild(btn);
        });
    }

    function handleAnswer(idx) {
        userAnswers[currentQuestionIndex] = idx;
        if(idx === questions[currentQuestionIndex].correct) score++;
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            init();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        document.getElementById('score-summary').innerHTML = `আপনার স্কোর: <b>${score} / ${questions.length}</b>`;
        let reviewHTML = "<h3>ভুলগুলো যাচাই করুন:</h3><br>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `<div class="result-item"><p><b>${questions[i].q}</b></p><p class="wrong">আপনার উত্তর: ${userAnswers[i] !== undefined ? questions[i].options[userAnswers[i]] : "উত্তর দেননি"}</p><p class="correct">সঠিক উত্তর: ${questions[i].options[questions[i].correct]}</p></div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }
    window.onload = init;
</script>
