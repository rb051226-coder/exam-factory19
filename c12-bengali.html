<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Class 12 Bengali Mega Mock Test</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #020617 0%, #111827 50%, #311042 100%);
            color: #f8fafc; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); width: 100%; max-width: 750px; padding: 40px 30px; text-align: center;
        }
        .brand-logo {
            font-size: 30px; font-weight: 800; text-transform: uppercase;
            background: linear-gradient(to right, #fb7185, #f43f5e); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }
        .quiz-meta {
            display: flex; justify-content: space-between; margin-bottom: 25px; font-weight: 600;
            background: rgba(0,0,0,0.25); padding: 12px 20px; border-radius: 12px;
        }
        #timer { color: #f43f5e; }
        .q-box {
            font-size: 18px; text-align: left; margin-bottom: 25px; line-height: 1.6;
            background: rgba(255,255,255,0.02); padding: 20px; border-radius: 14px; border-left: 5px solid #f43f5e;
        }
        .opt-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn {
            background: rgba(255, 255, 255, 0.04); border: 2px solid rgba(255, 255, 255, 0.08);
            padding: 16px; border-radius: 12px; color: white; text-align: left; font-size: 16px; cursor: pointer; transition: 0.2s;
        }
        .opt-btn:hover { background: rgba(255, 255, 255, 0.12); border-color: #f43f5e; transform: translateX(5px); }
        .btn-3d {
            background: linear-gradient(135deg, #f43f5e, #be123c); color: white; border: none;
            padding: 16px 32px; font-size: 16px; font-weight: 600; border-radius: 14px; cursor: pointer;
            box-shadow: 0 6px 0 #9f1239; transition: 0.1s; display: inline-block; margin-top: 20px; text-decoration: none;
        }
        .btn-3d:active { transform: translateY(4px); box-shadow: 0 2px 0 #9f1239; }
        .screen { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">Exam Factory ➔ দ্বাদশ শ্রেণী বাংলা (১০০ নম্বর)</div>

    <div id="quiz-screen" class="screen active">
        <div class="quiz-meta">
            <span id="q-count" style="color:#fb7185;">প্রশ্ন: ১ / ১০০</span>
            <span id="timer">সময়: ১০০:০০</span>
        </div>
        <div class="q-box" id="q-text">প্রশ্ন লোড হচ্ছে...</div>
        <div class="opt-grid">
            <button class="opt-btn" onclick="handleAnswer(0)"></button>
            <button class="opt-btn" onclick="handleAnswer(1)"></button>
            <button class="opt-btn" onclick="handleAnswer(2)"></button>
            <button class="opt-btn" onclick="handleAnswer(3)"></button>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="color: #4ade80; font-size: 28px; margin-bottom: 15px;">🎉 মেগা মক টেস্ট সম্পূর্ণ!</h2>
        <p id="result-details" style="font-size: 18px; margin-bottom: 30px; color:#cbd5e1;"></p>
        <a href="index.html" class="btn-3d">প্রধান ড্যাশবোর্ডে ফিরুন</a>
    </div>
</div>

<script>
    const questions = [
        // --- কে বাঁচায়, কে বাঁচে! (১-১০) ---
        { q: "১. 'কে বাঁচায়, কে বাঁচে!' গল্পটির লেখক কে?", options: ["ক) মাণিক বন্দ্যোপাধ্যায়", "খ) বিভূতিভূষণ বন্দ্যোপাধ্যায়", "গ) তারাশঙ্কর বন্দ্যোপাধ্যায়", "ঘ) সতীনাথ ভাদূড়ী"], correct: 0 },
        { q: "২. মৃত্যুঞ্জয় প্রথম অনাহারে মৃত্যু দেখেছিল কোথায়?", options: ["ক) ফুটপাতে", "খ) স্টেশনে", "গ) ট্রামে", "ঘ) বাজারে"], correct: 0 },
        { q: "৩. নিখিল মৃত্যুঞ্জয়ের চেয়ে কত টাকা মাইনে কম পেত?", options: ["ক) ৫০ টাকা", "খ) ৩০ টাকা", "গ) ২০ টাকা", "ঘ) ৪০ টাকা"], correct: 0 },
        { q: "৪. অফিসে মৃত্যুঞ্জয়ের কুঠুরিটি কেমন ছিল?", options: ["ক) নিরালা ও ছোট", "খ) বিশাল বড়", "গ) অন্ধকার", "ঘ) কোলাহলপূর্ণ"], correct: 0 },
        { q: "৫. নিখিল অবসর জীবনটা কীভাবে কাটাতে চেয়েছিল?", options: ["ক) বই পড়ে আর একটা চিন্তাজগত গড়ে তুলে", "খ) ব্যবসা করে", "গ) গ্রামে গিয়ে চাষবাস করে", "ঘ) ঘুরে বেড়িয়ে"], correct: 0 },
        { q: "৬. 'মনে আঘাত লাগলে মৃত্যুঞ্জয়ের'— কী হয়?", options: ["ক) শরীরে তার প্রতিক্রিয়া হয়", "খ) সে খুব কাঁদে", "গ) রাগ বেড়ে যায়", "ঘ) সে চুপ হয়ে যায়"], correct: 0 },
        { q: "৭. মৃত্যুঞ্জয়ের বাড়ির লোক সংখ্যা কত ছিল?", options: ["ক) ৯ জন", "খ) ৭ জন", "গ) ৫ জন", "ঘ) ১১ জন"], correct: 0 },
        { q: "৮. নিখিলকে প্রতি মাসে কটি জায়গায় সাহায্য পাঠাতে হতো?", options: ["ক) তিনটি জায়গায়", "খ) দুটি জায়গায়", "গ) চারটি জায়গায়", "ঘ) পাঁচটি জায়গায়"], correct: 0 },
        { q: "৯. গল্পের শেষে মৃত্যুঞ্জয়ের পরনে কী ছিল?", options: ["ক) ছেঁড়া ধুতি ও ধূলিমলিন গা", "খ) অফিসের স্যুট", "গ) নতুন জামা", "ঘ) গেরুয়া বসন"], correct: 0 },
        { q: "১০. 'ওটা পাশবিক স্বার্থপরতা'— বক্তা কে?", options: ["ক) মৃত্যুঞ্জয়", "খ) নিখিল", "গ) টুনুর মা", "ঘ) বড়বাবু"], correct: 0 },

        // --- ভাত (১১-২০) ---
        { q: "১১. 'ভাত' গল্পটির লেখিকা কে?", options: ["ক) মহাশ্বেতা দেবী", "খ) আশাপূর্ণা দেবী", "গ) লীলা মজুমদার", "ঘ) মহেশ্বতা ভট্টাচার্য"], correct: 0 },
        { q: "১২. উৎসব নাইয়া কার বাড়িতে কাজের খোঁজে এসেছিল?", options: ["ক) বড় পিসিমার বাড়িতে", "খ) তান্ত্রিকের বাড়িতে", "গ) বাসিনীর মুনিবের বাড়িতে", "ঘ) জমিদারের বাড়িতে"], correct: 2 },
        { q: "১৩. বড় বাড়িতে বুড়ো কর্তার লিভারের ক্যান্সার সারাতে কে এসেছিলেন?", options: ["ক) মস্ত বড় ডাক্তার", "খ) তান্ত্রিক বা সাধুবাবা", "গ) কবিরাজ", "ঘ) তান্ত্রিকের চেলা"], correct: 1 },
        { q: "১৪. বড় বাড়ির দেবত্র বাড়ি কটি ছিল?", options: ["ক) আঠারোটি", "খ) বারোটি", "গ) চোদ্দোটি", "ঘ) পনেরোটি"], correct: 0 },
        { q: "১৫. উৎসবকে কাট কাটতে বলা হয়েছিল কত ওজনের?", options: ["ক) আধমন করে প্রতিটি", "খ) একমন করে প্রতিটি", "গ) পাঁচ কেজি করে", "ঘ) দশ কেজি করে"], correct: 0 },
        { q: "১৬. মাতলার বন্যায় উৎসবের হারিয়ে যাওয়া স্ত্রীর নাম কী ছিল?", options: ["ক) চুনুনীর মা", "খ) বাসিনী", "গ) ললিতা", "ঘ) হরিমতি"], correct: 0 },
        { q: "১৭. তান্ত্রিক কোন কাঠ দিয়ে যজ্ঞের হোম করতে বলেছিলেন?", options: ["ক) বেল, কেওড়া, কড়ই, বট, তেঁতুল", "খ) শাল, সেগুন, আম", "গ) চন্দন ও দেবদারু", "ঘ) নিম ও বাঁশ"], correct: 0 },
        { q: "১৮. বুড়ো কর্তা মারা যাওয়ার পর পিসীমা সব ভাত কোথায় ফেলে দিতে বলেছিলেন?", options: ["ক) পুকুরে", "খ) ডাস্টবিনে বা ভাগাড়ে", "গ) নদীতে", "ঘ) গরুকে খেতে"], correct: 1 },
        { q: "১৯. পেতলের ডেকচি নিয়ে উৎসব কোথায় গিয়ে প্রথম ভাত খেয়েছিল?", options: ["ক) স্টেশনে", "খ) ফুটপাতে", "গ) ট্রেনের ভেতরে", "ঘ) মাঠে"], correct: 0 },
        { q: "২০. ভাত খাওয়ার পর উৎসব কোথায় ঘুমিয়ে পড়েছিল?", options: ["ক) প্ল্যাটফর্মে", "খ) স্টেশনের বেঞ্চে", "গ) বড় বাড়ির উঠোনে", "ঘ) ডাস্টবিনের পাশে"], correct: 0 },

        // --- ভারতবর্ষ (২১-৩০) ---
        { q: "২১. 'ভারতবর্ষ' গল্পটি কার লেখা?", options: ["ক) সৈয়দ মুস্তাফা সিরাজ", "খ) কাজী নজরুল ইসলাম", "গ) প্রেমেন্দ্র মিত্র", "ঘ) তারাশঙ্কর বন্দ্যোপাধ্যায়"], correct: 0 },
        { q: "২২. পিচের সড়কটি বাঁক নিয়েছে যেখানে, সেখানে কী ছিল?", options: ["ক) একটা ছোট বাজার", "খ) মস্ত বড় নদী", "গ) বটগাছ", "ঘ) রেল স্টেশন"], correct: 0 },
        { q: "২৩. 'রাঢ় বাংলার শীতে ধারালো বৃষ্টিকে' ছোটলোকেরা কী বলে?", options: ["ক) ফাঁপি", "খ) ডাওর", "গ) আলুনি", "ঘ) ঝোড়ো হাওয়া"], correct: 1 },
        { q: "২৪. বৃষ্টির সঙ্গে বাতাস জোরালো হলে তাকে কী বলা হয়?", options: ["ক) ফাঁপি", "খ) ডাওর", "গ) দুর্যোগ", "ঘ) তুফান"], correct: 0 },
        { q: "২৫. বাজারে চায়ের দোকান কটি ছিল?", options: ["ক) তিনটি", "খ) দুটি", "গ) চারটি", "ঘ) পাঁচটি"], correct: 0 },
        { q: "২৬. থুরথুরে কুঁজো বুড়ির পরনে কী ছিল?", options: ["ক) চিটচিটে নোংরা একটা ছেঁড়া কাপড়", "খ) সাদা থান শাড়ি", "গ) কম্বল", "ঘ) নতুন চাদর"], correct: 0 },
        { q: "২৭. বুড়িকে হরিবল বলতে কে শুনেছিল বলে দাবি করেছিল?", options: ["ক) নকরী নাপিত", "খ) ফজলু মিঞা", "গ) ভটচাজ মশাই", "ঘ) নিবারণ বাগদি"], correct: 0 },
        { q: "২৮. মোল্লা সাহেবের মতে বুড়ি মরার সময় কী বলেছিল?", options: ["ক) বিসমিল্লাহ বা আল্লা", "খ) রাধামাধব", "গ) জয় শ্রীরাম", "ঘ) কিছুই বলেনি"], correct: 0 },
        { q: "২৯. নিবারণ বাগদি একসময় কী ছিল?", options: ["ক) ডাকাত", "খ) পুলিশ", "গ) দোকানদার", "ঘ) চাষী"], correct: 0 },
        { q: "৩০. 'জিজ্ঞাসা করলুম—তোমার জাতি কী?'— বুড়ি কী উত্তর দিয়েছিল?", options: ["ক) তোরা মর, মুখপোড়ারা!", "খ) আমি হিন্দু", "গ) আমি মুসলমান", "ঘ) মানুষের আবার জাতি কী!"], correct: 0 },

        // --- রূপনারাণের কূলে (৩১-৪০) ---
        { q: "৩১. 'রূপনারাণের কূলে' কবিতাটি রবীন্দ্রনাথের কোন কাব্যগ্রন্থের অন্তর্গত?", options: ["ক) শেষ লেখা", "খ) গীতাঞ্জলি", "গ) বলাকা", "ঘ) পুনশ্চ"], correct: 0 },
        { q: "৩২. 'রূপনারাণের কূলে জাগিয়া উঠিলাম'— জেগে উঠে কবি কী জানলেন?", options: ["ক) এ জগৎ স্বপ্ন নয়", "খ) এ জগৎ মায়া", "গ) জীবন খুব সুন্দর", "ঘ) মৃত্যু অনিবার্য"], correct: 0 },
        { q: "৩৩. কবি নিজের রূপ কিসে দেখতে পেলেন?", options: ["ক) রক্তের অক্ষরে", "খ) আয়নায়", "গ) জলের ছায়ায়", "ঘ) অন্যের চোখে"], correct: 0 },
        { q: "৩৪. চিনিলাম আপনারে— কবি নিজেকে কীভাবে চিনলেন?", options: ["ক) আঘাতে আঘাতে, বেদনায় বেদনায়", "খ) সুখে ও আনন্দে", "গ) পড়াশোনা করে", "ঘ) সাধনা করে"], correct: 0 },
        { q: "৩৫. 'সত্য যে কঠিন'— কবি কঠিন সত্যকে ভালোবাসলেন কেন?", options: ["ক) সে কখনো বঞ্চনা করে না", "খ) সত্য খুব সুন্দর", "গ) সত্য সহজে মেলে", "ঘ) সমাজ সত্যকে চায়"], correct: 0 },
        { q: "৩৬. এ জীবন কীসের তপস্যা বলে কবি মনে করেন?", options: ["ক) আমৃত্যু দুঃখের তপস্যা", "খ) আনন্দের সাধনা", "গ) ধনের লালসা", "ঘ) ঈশ্বরের আরাধনা"], correct: 0 },

    let currentQuestionIndex = 0; let score = 0; let timerInterval; let timeLeft = 6000;
    function startQuiz() {
        currentQuestionIndex = 0; score = 0; timeLeft = 6000; updateQuestionUI();
        timerInterval = setInterval(() => {
            if(timeLeft <= 0) { endQuiz(); } else {
                timeLeft--; let min = Math.floor(timeLeft / 60); let sec = timeLeft % 60;
                document.getElementById('timer').innerText = `সময়: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            }
        }, 1000);
    }
    function updateQuestionUI() {
        document.getElementById('q-count').innerText = `প্রশ্ন: ${currentQuestionIndex + 1} / ১০০`;
        let qObj = questions[currentQuestionIndex]; document.getElementById('q-text').innerText = qObj.q;
        const buttons = document.querySelectorAll('.opt-btn');
        buttons[0].innerText = qObj.options[0]; buttons[1].innerText = qObj.options[1];
        buttons[2].innerText = qObj.options[2]; buttons[3].innerText = qObj.options[3];
    }
    function handleAnswer(selectedIndex) {
        if(selectedIndex === questions[currentQuestionIndex].correct) { score++; }
        if(currentQuestionIndex < 99) { currentQuestionIndex++; updateQuestionUI(); } else { endQuiz(); }
    }
    function endQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('result-details').innerHTML = `
            আপনি ১০০ টি প্রশ্নের মধ্যে মোট <b style="color:#fb7185; font-size:28px;">${score}</b> টি সঠিক উত্তর দিয়েছেন। <br><br>
            আপনার প্রাপ্ত নম্বর: <span style="color:#4ade80;font-size:24px; font-weight:700;">${score} / ১০০</span>
        `;
    }
    startQuiz();
</script>
