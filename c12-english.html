<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Class 12 English (100 Qs)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: #f8fafc; min-height: 100vh; padding: 20px; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; width: 100%; max-width: 800px; margin: auto; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-logo { font-size: 24px; font-weight: 700; color: #fb7185; text-align: center; margin-bottom: 20px; }
        .q-box { font-size: 19px; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-left: 5px solid #38bdf8; border-radius: 8px; }
        .opt-btn { background: #1e293b; padding: 15px; margin-bottom: 10px; width: 100%; border-radius: 8px; border: 1px solid #334155; color: white; cursor: pointer; text-align: left; font-size: 16px; transition: 0.2s; }
        .opt-btn:hover { background: #334155; border-color: #38bdf8; }
        .finish-btn { background: #ef4444; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .result-item { background: #1e293b; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #f87171; }
        .correct { color: #4ade80; font-weight: bold; }
        .wrong { color: #f87171; font-weight: bold; }
        .screen { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand-logo">EXAM FACTORY ➔ Class 12 English</div>
    
    <div id="quiz-screen" class="screen active">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-weight:bold; color:#38bdf8;">
            <span id="q-count">Question: 1 / 100</span>
            <span id="timer">Time: 120:00</span>
        </div>
        <div id="q-text" class="q-box">Loading question...</div>
        <div id="opt-container">
            <button class="opt-btn" onclick="handleAnswer(0)"></button>
            <button class="opt-btn" onclick="handleAnswer(1)"></button>
            <button class="opt-btn" onclick="handleAnswer(2)"></button>
            <button class="opt-btn" onclick="handleAnswer(3)"></button>
        </div>
        <button class="finish-btn" onclick="endQuiz()">Finish Test</button>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="text-align:center; margin-bottom:20px; color:#4ade80;">Performance Analysis</h2>
        <div id="score-summary" style="text-align:center; font-size: 24px; margin-bottom: 20px;"></div>
        <div id="review-list"></div>
        <div style="text-align:center; margin-top:30px;"><a href="#" onclick="location.reload()" style="color:#38bdf8; text-decoration:none; font-weight:bold;">◀ Restart Test</a></div>
    </div>
</div>

<script>

        { q: "13. What did the narrator say about Mussoorie in October?", options: ["A) Very hot", "B) Pleasant", "C) Rainy", "D) Snowy"], correct: 1 },
        { q: "14. Who came to see the girl off?", options: ["A) Her father", "B) Her mother", "C) Her brother", "D) Her friend"], correct: 1 },
        { q: "15. The narrator thought the girl's voice had the sparkle of a...", options: ["A) Mountain stream", "B) Bell", "C) Song", "D) Wind"], correct: 0 },

        { q: "18. What was the narrator doing at the window?", options: ["A) Sleeping", "B) Looking at the scene", "C) Dreaming", "D) Eating"], correct: 1 },

        { q: "20. How long did the narrator talk to the girl?", options: ["A) 1 hour", "B) 30 minutes", "C) Few minutes", "D) All day"], correct: 2 },
        { q: "21. Who wrote 'Strong Roots'?", options: ["A) Ruskin Bond", "B) APJ Abdul Kalam", "C) Shakespeare", "D) Wordsworth"], correct: 1 },
        { q: "22. Where was Kalam's ancestral house located?", options: ["A) Mosque Street", "B) Temple Street", "C) Church Street", "D) School Street"], correct: 0 },

        { q: "51. What did she give Roger before he left?", options: ["A) Advice", "B) Money", "C) Clothes", "D) A hug"], correct: 1 },
        { q: "52. Why did Roger want the shoes?", options: ["A) To look cool", "B) To wear to school", "C) Because he liked them", "D) To impress others"], correct: 0 },
        { q: "53. What did she tell Roger about her past?", options: ["A) She was rich", "B) She had done things too", "C) She was a saint", "D) She was a queen"], correct: 1 },
        { q: "54. Roger was a...", options: ["A) Teenager", "B) Man", "C) Child", "D) Old person"], correct: 0 },
        { q: "55. Why didn't Roger run?", options: ["A) He was tired", "B) He trusted her", "C) He was scared", "D) He wanted food"], correct: 1 },
        { q: "56. What did she tell him to do first?", options: ["A) Wash his face", "B) Eat", "C) Sleep", "D) Go home"], correct: 0 },
        { q: "57. Mrs. Luella had a...", options: ["A) Small purse", "B) Large purse", "C) No purse", "D) Briefcase"], correct: 1 },
        { q: "58. Roger was...", options: ["A) Honest", "B) A thief", "C) A student", "D) A liar"], correct: 1 },
        { q: "59. The tone of the story is...", options: ["A) Dark", "B) Compassionate", "C) Humorous", "D) Tragic"], correct: 1 },
        { q: "60. Roger thanked her by saying...", options: ["A) Thank you", "B) Goodbye", "C) Nothing", "D) Sorry"], correct: 0 },
        { q: "61. Who wrote 'Three Questions'?", options: ["A) Leo Tolstoy", "B) Ruskin Bond", "C) Kalam", "D) Hughes"], correct: 0 },
        { q: "62. The King wanted to know...", options: ["A) Two questions", "B) Three questions", "C) Four questions", "D) Ten questions"], correct: 1 },
        { q: "63. The first question was about...", options: ["A) Right time", "B) Right person", "C) Right work", "D) Future"], correct: 0 },
        { q: "64. The second question was about...", options: ["A) Right person", "B) Right time", "C) Right work", "D) Right food"], correct: 0 },
        { q: "65. The third question was about...", options: ["A) Right work", "B) Right person", "C) Right time", "D) Right house"], correct: 0 },
        { q: "66. Who did the King visit?", options: ["A) Hermit", "B) Minister", "C) General", "D) Neighbor"], correct: 0 },
        { q: "67. Where did the hermit live?", options: ["A) In a wood", "B) In a palace", "C) In a city", "D) In a mountain"], correct: 0 },
        { q: "68. What was the hermit doing?", options: ["A) Digging", "B) Eating", "C) Sleeping", "D) Writing"], correct: 0 },
        { q: "69. Who came running out of the woods?", options: ["A) A bearded man", "B) A soldier", "C) A thief", "D) A child"], correct: 0 },
        { q: "70. What happened to the man?", options: ["A) He was wounded", "B) He was dead", "C) He was hungry", "D) He was lost"], correct: 0 },
        { q: "71. The King...", options: ["A) Saved him", "B) Killed him", "C) Ignored him", "D) Arrested him"], correct: 0 },
        { q: "72. The wounded man was...", options: ["A) King's enemy", "B) King's friend", "C) Hermit's friend", "D) Stranger"], correct: 0 },
        { q: "73. The man asked for...", options: ["A) Forgiveness", "B) Money", "C) Food", "D) Water"], correct: 0 },
        { q: "74. The King forgave him and...", options: ["A) Promised to return property", "B) Put him in jail", "C) Sent him away", "D) Ignored him"], correct: 0 },
        { q: "75. What were the answers to the King's questions?", options: ["A) Present moment, necessary person, doing good", "B) Future, friend, wealth", "C) Past, family, power", "D) None"], correct: 0 },
        { q: "76. Why is the present moment important?", options: ["A) It's the only time we have power", "B) It's easy", "C) It's fun", "D) It doesn't matter"], correct: 0 },
        { q: "77. Who is the most important person?", options: ["A) The one you are with", "B) The King", "C) The Hermit", "D) Yourself"], correct: 0 },
        { q: "78. What is the most important work?", options: ["A) To do good", "B) To make money", "C) To win wars", "D) To rest"], correct: 0 },
        { q: "79. The King was...", options: ["A) Wise", "B) Foolish", "C) Cruel", "D) Lazy"], correct: 0 },
        { q: "80. The story teaches us...", options: ["A) Kindness", "B) Greed", "C) Pride", "D) Hate"], correct: 0 },
        { q: "81. Who wrote 'Asleep in the Valley'?", options: ["A) Rimbaud", "B) Keats", "C) Shakespeare", "D) Frost"], correct: 0 },
        { q: "82. In 'Asleep in the Valley', the soldier is...", options: ["A) Dead", "B) Sleeping", "C) Eating", "D) Running"], correct: 0 },
        { q: "83. The valley is...", options: ["A) Green", "B) Red", "C) Dry", "D) Rocky"], correct: 0 },
        { q: "84. The soldier has two...", options: ["A) Red holes", "B) Blue eyes", "C) White hands", "D) Black feet"], correct: 0 },
        { q: "85. 'On Killing a Tree' is about...", options: ["A) Environmental damage", "B) Growth", "C) Farming", "D) Gardening"], correct: 0 },
        { q: "86. It takes much time to...", options: ["A) Kill a tree", "B) Plant a tree", "C) Water a tree", "D) Prune a tree"], correct: 0 },
        { q: "87. The root is...", options: ["A) White and wet", "B) Black and dry", "C) Red and long", "D) Green and soft"], correct: 0 },
        { q: "88. Who wrote 'Shall I compare thee to a summer's day'?", options: ["A) Shakespeare", "B) Wordsworth", "C) Keats", "D) Frost"], correct: 0 },
        { q: "89. Summer's lease hath all too...", options: ["A) Short a date", "B) Long a date", "C) Ended", "D) Begun"], correct: 0 },
        { q: "90. What is 'The Proposal'?", options: ["A) A comedy", "B) A tragedy", "C) A thriller", "D) A poem"], correct: 0 },
        { q: "91. Who wrote 'The Proposal'?", options: ["A) Chekhov", "B) Shakespeare", "C) Tolstoy", "D) Wilde"], correct: 0 },
        { q: "92. Who is Lomov?", options: ["A) A landowner", "B) A farmer", "C) A doctor", "D) A poet"], correct: 0 },
        { q: "93. Who is Natalya?", options: ["A) Chubukov's daughter", "B) Lomov's sister", "C) A maid", "D) A stranger"], correct: 0 },
        { q: "94. What do they fight about first?", options: ["A) Oxen Meadows", "B) Dogs", "C) Marriage", "D) Money"], correct: 0 },
        { q: "95. Lomov's dog is...", options: ["A) Guess", "B) Squeezer", "C) Bruno", "D) Tiger"], correct: 0 },
        { q: "96. Natalya's dog is...", options: ["A) Squeezer", "B) Guess", "C) Pluto", "D) Rex"], correct: 0 },
        { q: "97. Chubukov is Natalya's...", options: ["A) Father", "B) Brother", "C) Husband", "D) Uncle"], correct: 0 },
        { q: "98. The play is set in...", options: ["A) Russia", "B) England", "C) France", "D) India"], correct: 0 },
        { q: "99. How does the play end?", options: ["A) Marriage", "B) Fight", "C) Divorce", "D) Death"], correct: 0 },
        { q: "100. English literature is...", options: ["A) Rich", "B) Poor", "C) Boring", "D) Useless"], correct: 0 }
    ];

    let currentQuestionIndex = 0, score = 0, timeLeft = 7200, userAnswers = [], timerInterval;

    function startTimer() {
        timerInterval = setInterval(() => {
            timeLeft--;
            let min = Math.floor(timeLeft / 60);
            let sec = timeLeft % 60;
            document.getElementById('timer').innerText = `Time: ${min}:${sec < 10 ? '0' : ''}${sec}`;
            if(timeLeft <= 0) endQuiz();
        }, 1000);
    }

    function updateUI() {
        let qObj = questions[currentQuestionIndex];
        document.getElementById('q-count').innerText = `Question: ${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('q-text').innerText = qObj.q;
        const buttons = document.querySelectorAll('.opt-btn');
        buttons.forEach((btn, i) => btn.innerText = qObj.options[i]);
    }

    function handleAnswer(selectedIndex) {
        userAnswers[currentQuestionIndex] = selectedIndex;
        if(selectedIndex === questions[currentQuestionIndex].correct) score++;
        
        if(currentQuestionIndex < questions.length - 1) {
            currentQuestionIndex++;
            updateUI();
        } else {
            endQuiz();
        }
    }

    function endQuiz() {
        clearInterval(timerInterval);
        document.getElementById('quiz-screen').classList.remove('active');
        document.getElementById('result-screen').classList.add('active');
        document.getElementById('score-summary').innerHTML = `Your Score: <b>${score} / ${questions.length}</b>`;

        let reviewHTML = "<h3>Review your mistakes:</h3><br>";
        for(let i = 0; i < questions.length; i++) {
            if(userAnswers[i] !== questions[i].correct) {
                reviewHTML += `
                <div class="result-item">
                    <p><b>Q: ${questions[i].q}</b></p>
                    <p class="wrong">Your Answer: ${userAnswers[i] !== undefined ? questions[i].options[userAnswers[i]] : "Not Answered"}</p>
                    <p class="correct">Correct Answer: ${questions[i].options[questions[i].correct]}</p>
                </div>`;
            }
        }
        document.getElementById('review-list').innerHTML = reviewHTML;
    }

    updateUI();
    startTimer();
</script>
</body>
</html>
