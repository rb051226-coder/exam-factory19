<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Premium Mock Test Dashboard</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            padding-top: 40px; /* notice space */
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 850px;
            padding: 40px 30px;
            text-align: center;
        }

        /* 🔔 NOTICE BAR */
        .notice-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(0,0,0,0.85);
            color: white;
            z-index: 99999;
            overflow: hidden;
            padding: 8px 0;
        }

        .notice-track {
            white-space: nowrap;
            display: inline-block;
            padding-left: 100%;
            animation: scrollNotice 12s linear infinite;
        }

        @keyframes scrollNotice {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* logo fallback */
        .logo-text {
            display: none;
            font-size: 24px;
            font-weight: 800;
            color: #38bdf8;
        }

        /* 👇 তোমার বাকি সব CSS SAME (unchanged) 👇 */
        .logo-container {
            margin: 0 auto 20px auto;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(134, 85, 250, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(134, 85, 250, 0.2);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-logo {
            font-size: 38px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #8655faf5, #00f2fe);
            background-size: 300% 300%;
            animation: glowText 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        @keyframes glowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn-3d {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 #1e40af, 0 12px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
        }

        .btn-3d:active {
            transform: translateY(4px);
        }

        .screen { display: none; }
        .active { display: block; }

        .error { color: red; display:none; }
    </style>
</head>

<body>

<!-- 🔔 NOTICE -->
<div class="notice-bar">
  <div class="notice-track" id="noticeTrack">Loading notice...</div>
</div>

<div class="glass-card">

    <!-- 🖼️ LOGO -->
    <div class="logo-container">
        <img id="app-logo" src="./assets/logo.png"
        onerror="this.style.display='none'; document.getElementById('logoText').style.display='block';">

        <div id="logoText" class="logo-text">RB</div>
    </div>

    <div class="brand-logo">Exam Factory</div>
    <div class="subtitle">West Bengal Board Testing Studio</div>

    <div id="lock-screen" class="screen active">
        <input type="password" id="access-code">
        <button class="btn-3d" onclick="verifyPassword()">Unlock</button>
        <p id="lock-error" class="error">Wrong Password</p>
    </div>

    <div id="dash-screen" class="screen">
        <h3>Dashboard Loaded ✔</h3>
    </div>

</div>

<script>
    const APP_PASSWORD = "2026";

    function verifyPassword() {
        const input = document.getElementById('access-code').value;
        if(input === APP_PASSWORD) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('dash-screen').style.display = 'block';
        } else {
            document.getElementById('lock-error').style.display = 'block';
        }
    }

    // 🔔 NOTICE SYSTEM (FOLDER BASED)
    let notices = [];
    let index = 0;

    async function loadNotices() {
        try {
            const res = await fetch("./notice/notice.json");
            const data = await res.json();
            notices = data.notices;
        } catch (e) {
            notices = ["Notice load failed"];
        }
    }

    function updateNotice() {
        if (notices.length === 0) return;
        document.getElementById("noticeTrack").innerText = notices[index];
        index = (index + 1) % notices.length;
    }

    loadNotices();
    setInterval(updateNotice, 4000);
</script>

</body>
</html>
