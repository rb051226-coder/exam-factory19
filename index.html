<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Premium Portal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: radial-gradient(circle at center, #1e1b4b, #0f172a); 
            color: #f8fafc; min-height: 100vh; display: flex; 
            justify-content: center; align-items: center; padding: 20px; 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 30px; 
            padding: 30px; 
            width: 100%; 
            max-width: 600px; 
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* লোগো গ্লোয়িং ইফেক্ট */
        .logo-box { 
            width: 110px; height: 110px; margin: 0 auto 20px; 
            border-radius: 25px; overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.2);
            background: #fff;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6; }
            to { box-shadow: 0 0 20px #d946ef, 0 0 40px #d946ef; }
        }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        .brand-name { font-size: 26px; font-weight: 800; margin-bottom: 25px; background: linear-gradient(to right, #fff, #a8a29e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ইনপুট ও বাটন */
        input { 
            width: 100%; padding: 16px; background: rgba(0, 0, 0, 0.3); 
            border: 2px solid rgba(255, 255, 255, 0.05); border-radius: 16px; 
            color: white; text-align: center; margin-bottom: 20px;
        }
        .btn-3d { 
            background: linear-gradient(135deg, #8b5cf6, #4f46e5);
            color: white; border: none; padding: 16px; border-radius: 16px; 
            cursor: pointer; width: 100%; font-weight: 600;
            transition: 0.3s;
        }
        .btn-3d:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }

        /* ড্যাশবোর্ড */
        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .class-toggle { display: flex; background: rgba(0, 0, 0, 0.4); padding: 5px; border-radius: 16px; margin-bottom: 25px; }
        .class-btn { flex: 1; padding: 12px; background: transparent; border: none; color: #94a3b8; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .class-btn.active-class { background: #8b5cf6; color: white; }
        
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .card-3d { 
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 5px; border-radius: 16px; cursor: pointer; transition: 0.3s;
        }
        .card-3d:hover { background: rgba(139, 92, 246, 0.2); border-color: #8b5cf6; transform: scale(1.03); }
        .card-title { font-size: 11px; margin-top: 8px; display: block; color: #e2e8f0; }
        .emoji { font-size: 20px; }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="logo-box">
        <img src="exam-factory-logo.png" alt="Logo">
    </div>
    <div class="brand-name">Exam Factory</div>

    <div id="lock-screen" class="screen active">
        <input type="password" id="access-code" placeholder="পাসওয়ার্ড দিন...">
        <button class="btn-3d" onclick="verifyPassword()">প্রবেশ করুন</button>
    </div>

    <div id="dash-screen" class="screen">
        <div class="class-toggle">
            <button id="btn-c11" class="class-btn active-class" onclick="setMode('c11')">Class 11</button>
            <button id="btn-c12" class="class-btn" onclick="setMode('c12')">Class 12</button>
            <button id="btn-job" class="class-btn" onclick="setMode('job')">Jobs</button>
        </div>

        <div id="academic-area" class="grid">
            <div class="card-3d" onclick="navigateTo('bengali')"><div class="emoji">📖</div><span class="card-title">বাংলা</span></div>
            <div class="card-3d" onclick="navigateTo('english')"><div class="emoji">🔤</div><span class="card-title">English</span></div>
            <div class="card-3d" onclick="navigateTo('math')"><div class="emoji">📐</div><span class="card-title">Math</span></div>
            <div class="card-3d" onclick="navigateTo('history')"><div class="emoji">📜</div><span class="card-title">ইতিহাস</span></div>
            <div class="card-3d" onclick="navigateTo('geography')"><div class="emoji">🗺️</div><span class="card-title">ভূগোল</span></div>
            <div class="card-3d" onclick="navigateTo('science')"><div class="emoji">🧪</div><span class="card-title">Science</span></div>
            <div class="card-3d" onclick="navigateTo('polscience')"><div class="emoji">⚖️</div><span class="card-title">Pol.Sc</span></div>
            <div class="card-3d" onclick="navigateTo('philosophy')"><div class="emoji">🧘</div><span class="card-title">দর্শন</span></div>
            <div class="card-3d" onclick="navigateTo('education')"><div class="emoji">🎓</div><span class="card-title">শিক্ষা</span></div>
            <div class="card-3d" onclick="navigateTo('economics')"><div class="emoji">📈</div><span class="card-title">Economics</span></div>
            <div class="card-3d" onclick="navigateTo('accountancy')"><div class="emoji">📊</div><span class="card-title">Acct.</span></div>
            <div class="card-3d" onclick="navigateTo('bst')"><div class="emoji">🏢</div><span class="card-title">BST</span></div>
        </div>

        <div id="job-area" class="grid" style="display: none;">
            <div class="card-3d" onclick="navigateTo('ssc')"><div class="emoji">🪖</div><span class="card-title">SSC GD</span></div>
            <div class="card-3d" onclick="navigateTo('railway')"><div class="emoji">🚂</div><span class="card-title">Railway</span></div>
            <div class="card-3d" onclick="navigateTo('wbpolice')"><div class="emoji">👮</div><span class="card-title">WB Police</span></div>
            <div class="card-3d" onclick="navigateTo('banking')"><div class="emoji">🏦</div><span class="card-title">Banking</span></div>
            <div class="card-3d" onclick="navigateTo('upsc')"><div class="emoji">🏛️</div><span class="card-title">UPSC</span></div>
            <div class="card-3d" onclick="navigateTo('others')"><div class="emoji">🎯</div><span class="card-title">Others</span></div>
        </div>
    </div>
</div>

<script>
    const APP_PASSWORD = "Rb@2026"; 
    let currentMode = "c11";

    function verifyPassword() {
        if(document.getElementById('access-code').value === APP_PASSWORD) {
            document.getElementById('lock-screen').classList.remove('active');
            document.getElementById('dash-screen').classList.add('active');
        } else { alert("ভুল পাসওয়ার্ড!"); }
    }

    function setMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.class-btn').forEach(btn => btn.classList.remove('active-class'));
        document.getElementById('btn-' + mode).classList.add('active-class');

        const isJob = (mode === 'job');
        document.getElementById('academic-area').style.display = isJob ? 'none' : 'grid';
        document.getElementById('job-area').style.display = isJob ? 'grid' : 'none';
    }

    function navigateTo(subject) {
        window.location.href = `${currentMode}-${subject}.html`;
    }
</script>
</body>
</html>
