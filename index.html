<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Factory | Premium Mock Test Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ✨ ৩ডি গ্লাস কার্ড ইফেক্ট */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 700px;
            padding: 40px 30px;
            text-align: center;
        }

        /* 🖼️ লোগো বক্স স্টাইল */
        .logo-container {
            margin: 0 auto 20px auto;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(134, 85, 250, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(134, 85, 250, 0.2);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 🔥 ৩ডি গ্লোয়িং ব্র্যান্ড নেম */
        .brand-logo {
            font-size: 38px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(to right, #ff7e5f, #feb47b, #8655faf5, #00f2fe);
            background-size: 300% 300%;
            animation: glowText 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        @keyframes glowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🔐 পাসওয়ার্ড ইনপুট */
        input {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .btn-3d {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 6px 0 #1e40af, 0 12px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.1s ease;
        }

        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e40af, 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        /* 📊 ক্লাস বাটন */
        .class-toggle {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 30px;
            margin-bottom: 25px;
        }

        .class-btn {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            border-radius: 25px;
            transition: 0.3s;
        }

        .class-btn.active-class {
            background: linear-gradient(135deg, #a855f7, #6b21a8);
            color: white;
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.4);
        }

        /* 🎛️ সাবজেক্ট গ্রিড */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .card-3d {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px 15px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        .card-3d:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #38bdf8;
            box-shadow: 0 12px 24px rgba(56, 189, 248, 0.2);
        }

        .card-title {
            display: block;
            margin-top: 10px;
            font-weight: 600;
            font-size: 16px;
        }

        .footer-credit {
            margin-top: 35px;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1px;
        }

        .error { color: #ef4444; margin-top: 10px; font-weight: 600; display: none; }
    </style>
</head>
<body>

<div class="glass-card">
    
    <div class="logo-container">
        <img id="app-logo" src="logo.png" alt="RB">
    </div>

    <div class="brand-logo">Exam Factory</div>
    <div class="subtitle">West Bengal Board Testing Studio</div>

    <div id="lock-screen" class="screen active">
        <p style="margin-bottom: 20px; color: #cbd5e1;">সুরক্ষিত পোর্টালে প্রবেশ করতে অ্যাক্সেস কোডটি লিখুন</p>
        <input type="password" id="access-code" placeholder="পাসওয়ার্ডটি এখানে দিন...">
        <button class="btn-3d" onclick="verifyPassword()">আনলক করুন</button>
        <p id="lock-error" class="error">ভুল পাসওয়ার্ড! আবার সঠিক কোডটি দিন।</p>
    </div>

    <div id="dash-screen" class="screen">
        <div class="class-toggle">
            <button id="c11" class="class-btn active-class" onclick="setClass('Class 11')">Class 11 (একাদশ)</button>
            <button id="c12" class="class-btn" onclick="setClass('Class 12')">Class 12 (দ্বাদশ)</button>
        </div>
        
        <p style="text-align: left; color: #38bdf8; font-weight: 600; margin-bottom: 15px; font-size: 14px;">আপনার বিষয়টি বেছে নিন:</p>
        
        <div class="grid">
            <div class="card-3d" onclick="navigateToSubject('bengali.html')">📖<span class="card-title">বাংলা</span></div>
            <div class="card-3d" onclick="navigateToSubject('english.html')">🔤<span class="card-title">English</span></div>
            <div class="card-3d" onclick="navigateToSubject('history.html')">📜<span class="card-title">ইতিহাস</span></div>
            <div class="card-3d" onclick="navigateToSubject('geography.html')">🗺️<span class="card-title">ভূগোল</span></div>
        </div>

        <div class="footer-credit">POWERED BY @RB_creations._in</div>
    </div>

</div>

<script>
    // 🔑 মাস্টার পাসওয়ার্ড 
    const APP_PASSWORD = "2026";
    let currentClass = "Class 11";

    function verifyPassword() {
        const input = document.getElementById('access-code').value;
        if(input === APP_PASSWORD) {
            document.getElementById('lock-error').style.display = 'none';
            showScreen('dash-screen');
        } else {
            document.getElementById('lock-error').style.display = 'block';
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setClass(className) {
        currentClass = className;
        document.getElementById('c11').classList.toggle('active-class', className === 'Class 11');
        document.getElementById('c12').classList.toggle('active-class', className === 'Class 12');
        // ক্লাস অনুযায়ী আলাদা ফাইল লিংক করতে চাইলে ফিউচারে এখানে লজিক যোগ করা যাবে
    }

    // 🚀 সাবজেক্টের আলাদা ফাইলে যাওয়ার ফাংশন
    function navigateToSubject(pageName) {
        window.location.href = pageName;
    }

    // যদি লোগো ইমেজ খুঁজে না পায়, তবে ব্যাকআপ হিসেবে একটা টেক্সট বা সুন্দর ডিজাইন দেখাবে
    document.getElementById('app-logo').onerror = function() {
        this.style.display = 'none';
        document.querySelector('.logo-container').innerHTML = "<b style='color:#38bdf8; font-size:24px;'>RB</b>";
    };
</script>

</body>
</html>
